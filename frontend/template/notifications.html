<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications — CRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <div class="container-fluid p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="page-section-title">Notifications</h2>
                            <small class="text-muted">A timeline of recent system alerts and critical updates.</small>
                        </div>
                        <button class="btn btn-outline-secondary btn-sm" onclick="clearAlerts()">
                            <i class="bi bi-check2-all me-1"></i> Mark All as Read
                        </button>
                    </div>

                    <div class="card shadow-sm border-0" style="border-radius: 12px; max-width: 800px;">
                        <div class="card-body p-0">
                            <!-- Feed -->
                            <div id="notif-list">
                                <!-- Dynamically loaded -->
                                <div class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div><!-- /page-content -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui_components.js?v=1772780187"></script>
    <script src="../js/auth.js?v=2.3"></script>
    <script src="../js/notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('notifications');
        injectTopHeader('Notifications');
    </script>
</body>

</html>
