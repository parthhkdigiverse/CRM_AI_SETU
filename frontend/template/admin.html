<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Users & Roles — SRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
    <style>
        .table-premium thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 1.5rem;
        }

        .table-premium tbody tr {
            transition: all 0.2s ease;
        }

        .table-premium tbody tr:hover {
            background-color: #f8fafc;
        }

        .table-premium tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #eef2ff;
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .btn-add-user {
            background-color: #4f46e5;
            color: white;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 500;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add-user:hover {
            background-color: #4338ca;
            color: white;
        }

        .role-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .role-admin {
            border-color: #fecaca;
            color: #ef4444;
            background-color: transparent;
        }

        .role-manager {
            border-color: #c7d2fe;
            color: #4f46e5;
            background-color: transparent;
        }

        .role-sales {
            border-color: #bbf7d0;
            color: #10b981;
            background-color: transparent;
        }

        .role-tele {
            border-color: #bae6fd;
            color: #0ea5e9;
            background-color: transparent;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-inactive {
            background-color: #fef3c7;
            color: #92400e;
        }


        .action-btn {
            color: #94a3b8;
            padding: 4px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .action-btn:hover {
            color: #1e293b;
        }
    </style>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <div class="p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="page-section-title">Users &amp; Roles</h2>
                            <p class="text-muted small mb-0">Manage system access and role assignments.</p>
                        </div>
                        <button class="btn btn-add-user" onclick="addUser()">
                            <i class="bi bi-plus-lg"></i> Add User
                        </button>
                    </div>

                    <div class="card border-0 shadow-sm overflow-hidden">
                        <table class="table table-premium mb-0">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-table">
                                <tr>
                                    <td colspan="5" class="text-center py-5">
                                        <div class="spinner-border spinner-border-sm text-primary"></div>
                                        <span class="ms-2 text-muted">Loading users...</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <!-- Add User Modal -->
        <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold" id="addUserModalLabel">Add New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addUserForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">FULL NAME <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="userName" required
                                    placeholder="e.g. Jane Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">EMAIL ADDRESS <span
                                        class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="userEmail" required
                                    placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">PASSWORD <span
                                        class="text-danger">*</span></label>
                                <div class="position-relative">
                                    <input type="password" class="form-control" id="userPassword" required
                                        placeholder="Min 8 chars, 1 Upper, 1 Lower, 1 Digit"
                                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                                        style="padding-right: 40px;">
                                    <button type="button" class="password-toggle"
                                        onclick="togglePasswordVisibility('userPassword', 'user-pwd-icon')">
                                        <i class="bi bi-eye" id="user-pwd-icon"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">SYSTEM ROLE <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="userRole" required>
                                    <option value="" disabled selected>Select a role...</option>
                                    <option value="ADMIN">Admin</option>
                                    <option value="PROJECT_MANAGER">Project Manager</option>
                                    <option value="SALES">Sales</option>
                                    <option value="TELESALES">Telesales</option>
                                    <option value="PROJECT_MANAGER_AND_SALES">PM &amp; Sales</option>
                                </select>
                            </div>
                            <div class="mb-3" id="empCodeField">
                                <label class="form-label text-muted small fw-bold">EMPLOYEE CODE</label>
                                <input type="text" class="form-control" id="userEmpCode" placeholder="e.g. EMP-001">
                            </div>
                            <div class="mb-3" id="joiningDateField">
                                <label class="form-label text-muted small fw-bold">JOINING DATE</label>
                                <input type="date" class="form-control" id="userJoiningDate">
                            </div>
                            <div class="mb-3" id="departmentField">
                                <label class="form-label text-muted small fw-bold">DEPARTMENT</label>
                                <input type="text" class="form-control" id="userDepartment" placeholder="e.g. Sales">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">BASE SALARY</label>
                                <div class="input-group">
                                    <span class="input-group-text">Rs.</span>
                                    <input type="number" class="form-control" id="userBaseSalary" placeholder="e.g. 25000" min="0" step="0.01">
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-add-user justify-content-center py-2"
                                    id="submitUserBtn">
                                    Create User
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold" id="editUserModalLabel">Edit User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editUserForm">
                            <input type="hidden" id="editUserId">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">FULL NAME <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editUserName" required
                                    placeholder="e.g. Jane Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">EMAIL ADDRESS (READ-ONLY)</label>
                                <input type="email" class="form-control bg-light" id="editUserEmail" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">SYSTEM ROLE</label>
                                <select class="form-select" id="editUserRole" required>
                                    <option value="ADMIN">Admin</option>
                                    <option value="PROJECT_MANAGER">Project Manager</option>
                                    <option value="SALES">Sales</option>
                                    <option value="TELESALES">Telesales</option>
                                    <option value="PROJECT_MANAGER_AND_SALES">PM &amp; Sales</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">STATUS</label>
                                <select class="form-select" id="editUserStatus" required>
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">EMPLOYEE CODE</label>
                                <input type="text" class="form-control" id="editUserEmpCode" placeholder="e.g. EMP-001">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">JOINING DATE</label>
                                <input type="date" class="form-control" id="editUserJoiningDate">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">DEPARTMENT</label>
                                <input type="text" class="form-control" id="editUserDepartment"
                                    placeholder="e.g. Sales">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">BASE SALARY</label>
                                <div class="input-group">
                                    <span class="input-group-text">Rs.</span>
                                    <input type="number" class="form-control" id="editUserBaseSalary" placeholder="e.g. 25000" min="0" step="0.01">
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-add-user justify-content-center py-2"
                                    id="submitEditUserBtn">
                                    Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/utils.js?v=2.3"></script>
        <script src="../js/api.js?v=2.3"></script>
        <script src="../js/auth.js?v=2.3"></script>
        <script src="../js/ui_components.js?v=20260312"></script>
        <script src="../js/app.js?v=2.3"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            requireAuth();
            const sidebarElement = document.getElementById('sidebar');
            if (sidebarElement) {
                sidebarElement.innerHTML = renderSidebar('admin');
            }
            injectTopHeader('Users & Roles');

            const roleMeta = {
                'ADMIN': { cls: 'role-admin', label: 'ADMIN' },
                'PROJECT_MANAGER': { cls: 'role-manager', label: 'PROJECT_MANAGER' },
                'SALES': { cls: 'role-sales', label: 'SALES' },
                'TELESALES': { cls: 'role-tele', label: 'TELESALES' },
                'PROJECT_MANAGER_AND_SALES': { cls: 'role-manager', label: 'PM & SALES' }
            };

            let loadedUsers = [];

            async function loadData() {
                try {
                    const users = await apiGet('/users/');

                    loadedUsers = users;

                    const tableBody = document.getElementById('users-table');
                    if (!tableBody) return;
                    if (!users.length) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No users found.</td></tr>';
                        return;
                    }

                    tableBody.innerHTML = users.map(u => {
                        const role = roleMeta[u.role] || { cls: '', label: u.role };
                        let displayName = u.name || '—';

                        return `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="fw-bold text-dark">${displayName}</div>
                            </div>
                        </td>
                        <td class="text-muted small">${u.email}</td>
                        <td>
                            <span class="role-pill ${role.cls}">${role.label}</span>
                        </td>
                        <td>
                            <span class="status-pill ${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <i class="bi bi-pencil-square action-btn" onclick="editUser(${u.id})"></i>
                                <i class="bi bi-trash action-btn" onclick="deleteUser(${u.id})"></i>
                            </div>
                        </td>
                    </tr>`;
                    }).join('');

                } catch (err) {
                    console.error(err);
                    const tableBody = document.getElementById('users-table');
                    if (tableBody) {
                        tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Error loading data: ${err.message}</td></tr>`;
                    }
                }
            }

            let addUserModalInstance = null;
            document.addEventListener('DOMContentLoaded', () => {
                const modalEl = document.getElementById('addUserModal');
                if (modalEl) {
                    addUserModalInstance = new bootstrap.Modal(modalEl);
                }

                const form = document.getElementById('addUserForm');
                if (form) {
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const btn = document.getElementById('submitUserBtn');

                        const name = document.getElementById('userName').value.trim();
                        const email = document.getElementById('userEmail').value.trim();
                        const password = document.getElementById('userPassword').value;
                        const role = document.getElementById('userRole').value;

                        if (!email || !password || !role) {
                            showToast('Please fill all required fields', 'error');
                            return;
                        }

                        try {
                            btn.disabled = true;
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Creating...';

                            const payload = {
                                email,
                                password,
                                role,
                                is_active: true
                            };
                            if (name) payload.name = name;

                            const empCode = document.getElementById('userEmpCode').value.trim();
                            const joiningDate = document.getElementById('userJoiningDate').value;
                            const department = document.getElementById('userDepartment').value.trim();
                            if (empCode) payload.employee_code = empCode;
                            if (joiningDate) payload.joining_date = joiningDate;
                            if (department) payload.department = department;
                            const baseSalary = document.getElementById('userBaseSalary').value;
                            if (baseSalary !== '') payload.base_salary = parseFloat(baseSalary);

                            await ApiClient.request('/auth/register', { method: 'POST', body: payload });

                            showToast('User created successfully', 'success');
                            form.reset();
                            if (addUserModalInstance) addUserModalInstance.hide();

                            loadData();
                        } catch (err) {
                            console.error(err);
                            let errMsg = 'Failed to create user';
                            if (err.data && err.data.detail) {
                                if (typeof err.data.detail === 'string') {
                                    errMsg = err.data.detail;
                                } else if (Array.isArray(err.data.detail) && err.data.detail.length > 0) {
                                    errMsg = err.data.detail[0].msg || errMsg;
                                }
                            }
                            showToast(errMsg, 'error');
                        } finally {
                            btn.disabled = false;
                            btn.innerHTML = 'Create User';
                        }
                    });
                }
            });

            let editUserModalInstance = null;
            document.addEventListener('DOMContentLoaded', () => {
                const editModalEl = document.getElementById('editUserModal');
                if (editModalEl) {
                    editUserModalInstance = new bootstrap.Modal(editModalEl);
                }

                const editForm = document.getElementById('editUserForm');
                if (editForm) {
                    editForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const btn = document.getElementById('submitEditUserBtn');
                        const id = document.getElementById('editUserId').value;
                        const newName = document.getElementById('editUserName').value.trim();
                        const newRole = document.getElementById('editUserRole').value;
                        const newStatus = document.getElementById('editUserStatus').value === 'true';

                        try {
                            btn.disabled = true;
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Saving...';

                            // The user schema allows updating name via profile update, and role via role update
                            // Since they are separate endpoints in this architecture, we run them concurrently if needed.
                            const originalUser = loadedUsers.find(u => u.id == id);

                            const promises = [];
                            if (originalUser.name !== newName) {
                                promises.push(ApiClient.request(`/users/${id}/profile`, { method: 'PATCH', body: { name: newName } }));
                            }
                            if (originalUser.role !== newRole) {
                                promises.push(ApiClient.updateUserRole(id, newRole));
                            }
                            if (originalUser.is_active !== newStatus) {
                                promises.push(ApiClient.updateUserStatus(id, newStatus));
                            }

                            const newEmpCode = document.getElementById('editUserEmpCode').value.trim();
                            const newJoiningDate = document.getElementById('editUserJoiningDate').value;
                            const newDepartment = document.getElementById('editUserDepartment').value.trim();
                            const baseSalaryVal = document.getElementById('editUserBaseSalary').value;
                            const newBaseSalary = baseSalaryVal !== '' ? parseFloat(baseSalaryVal) : null;

                            const profileUpdate = {};
                            if (originalUser.name !== newName) profileUpdate.name = newName;
                            if ((originalUser.employee_code || '') !== newEmpCode) profileUpdate.employee_code = newEmpCode || null;
                            if ((originalUser.joining_date || '') !== newJoiningDate) profileUpdate.joining_date = newJoiningDate || null;
                            if ((originalUser.department || '') !== newDepartment) profileUpdate.department = newDepartment || null;
                            if (originalUser.base_salary !== newBaseSalary && !(originalUser.base_salary == null && newBaseSalary === null)) profileUpdate.base_salary = newBaseSalary;

                            const patchPromises = [];
                            if (Object.keys(profileUpdate).length > 0) {
                                patchPromises.push(ApiClient.request(`/users/${id}/profile`, { method: 'PATCH', body: profileUpdate }));
                            }
                            if (originalUser.role !== newRole) {
                                patchPromises.push(ApiClient.updateUserRole(id, newRole));
                            }
                            if (originalUser.is_active !== newStatus) {
                                patchPromises.push(ApiClient.updateUserStatus(id, newStatus));
                            }

                            if (patchPromises.length > 0) {
                                await Promise.all(patchPromises);
                                showToast('User updated successfully', 'success');
                                if (editUserModalInstance) editUserModalInstance.hide();
                                loadData();
                            } else {
                                if (editUserModalInstance) editUserModalInstance.hide();
                            }

                        } catch (err) {
                            console.error(err);
                            showToast(err.message || 'Failed to update user', 'error');
                        } finally {
                            btn.disabled = false;
                            btn.innerHTML = 'Save Changes';
                        }
                    });
                }
            });

            window.addUser = () => {
                if (addUserModalInstance) {
                    document.getElementById('addUserForm').reset();
                    addUserModalInstance.show();
                } else {
                    showToast('Modal not initialized', 'error');
                }
            };

            window.editUser = (id) => {
                const user = loadedUsers.find(u => u.id === id);
                if (!user) {
                    showToast('User data not found for editing', 'error');
                    return;
                }

                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUserName').value = user.name || '';
                document.getElementById('editUserEmail').value = user.email || '';
                document.getElementById('editUserRole').value = user.role || '';
                document.getElementById('editUserStatus').value = user.is_active ? 'true' : 'false';
                document.getElementById('editUserEmpCode').value = user.employee_code || '';
                document.getElementById('editUserJoiningDate').value = user.joining_date || '';
                document.getElementById('editUserDepartment').value = user.department || '';
                document.getElementById('editUserBaseSalary').value = user.base_salary != null ? user.base_salary : '';

                if (editUserModalInstance) {
                    editUserModalInstance.show();
                }
            };

            window.deleteUser = async (id) => {
                if (!confirm(`Are you sure you want to delete user #${id}?`)) return;
                try {
                    await ApiClient.request(`/users/${id}`, { method: 'DELETE' });
                    showToast('User deleted successfully', 'success');
                    loadData();
                } catch (e) {
                    console.error(e);
                    let errMsg = 'Failed to delete user';
                    if (e.data && e.data.detail) {
                        if (typeof e.data.detail === 'string') {
                            errMsg = e.data.detail;
                        } else if (Array.isArray(e.data.detail) && e.data.detail.length > 0) {
                            errMsg = e.data.detail[0].msg || errMsg;
                        }
                    } else if (e.message) {
                        errMsg = e.message;
                    }
                    showToast(errMsg, 'error');
                }
            };

            window.toggleUserStatus = async (id, currentStatus) => {
                const action = currentStatus ? 'deactivate' : 'reactivate';
                if (!confirm(`Are you sure you want to ${action} user #${id}?`)) return;
                try {
                    await ApiClient.updateUserStatus(id, !currentStatus);
                    showToast(`User ${action}d successfully`, 'success');
                    loadData();
                } catch (e) {
                    console.error(e);
                    showToast(e.message || `Failed to ${action} user`, 'error');
                }
            };

            loadData();
        </script>
</body>

</html>
