                    onmouseover="this.style.boxShadow='0 2px 6px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='0 1px 2px rgba(0,0,0,0.05)'"
                    onclick="bsModal.show()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#202124" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Create
                </button>
                ${miniCal}
                ${myCals}
                ${otherCals}
            </div>`;
        }

        // ── Helper: Pack overlapping events ────────────────────────
        function packEvents(eventsList) {
            eventsList.sort((a, b) => {
                const sA = a.sh * 60 + a.sm, eA = a.eh * 60 + a.em;
                const sB = b.sh * 60 + b.sm, eB = b.eh * 60 + b.em;
                if (sA !== sB) return sA - sB;
                return eB - eA;
            });
            const placed = [];
            let columns = [];
            let lastEnd = null;
            function flush() {
                const numCols = columns.length;
                columns.forEach((col, c) => col.forEach(ev => placed.push({ ev, slot: c, slots: numCols })));
            }
            eventsList.forEach(ev => {
                const evS = ev.sh * 60 + ev.sm, evE = ev.eh * 60 + ev.em;
                if (lastEnd !== null && evS >= lastEnd) {
                    flush(); columns = []; lastEnd = null;
                }
                let placedInCol = false;
                for (let c = 0; c < columns.length; c++) {
                    const col = columns[c];
                    const lastEv = col[col.length - 1];
                    if (evS >= lastEv.eh * 60 + lastEv.em) {
                        col.push(ev); placedInCol = true; break;
                    }
                }
                if (!placedInCol) columns.push([ev]);
                if (lastEnd === null || evE > lastEnd) lastEnd = evE;
            });
            if (columns.length > 0) flush();
            return placed;
        }

        // ── Render calendar ─────────────────────────────────────
        async function renderCalendar() {
            let startD, endD;
            if (currentView === 'day') {
                startD = dStr(selectedDate);
                endD = dStr(selectedDate);
            } else if (currentView === 'month') {
                const centerDate = selectedDate || new Date();
                const mStart = new Date(centerDate.getFullYear(), centerDate.getMonth(), 1);
                startD = dStr(addDays(mStart, -mStart.getDay()));
                endD = dStr(addDays(mStart, 42)); // 6 weeks cover
            } else {
                startD = dStr(weekStart);
                endD = dStr(addDays(weekStart, 6)); // Week view
            }

            // Allow larger ranges for Tasks view
            if (showTaskView) {
                events = await fetchEvents(
                    dStr(addDays(new Date(), -30)),
                    dStr(addDays(new Date(), 30))
                );
            } else {
                events = await fetchEvents(startD, endD);
            }
            renderCalendarLocal();
        }

        function renderCalendarLocal() {

            const today = new Date();
            const todayStr = dStr(today);

            // ── TASK LIST VIEW ──────────────────────────────────────
            if (showTaskView) {
                // Group events by date, sort by time
                const grouped = {};
                events.forEach(ev => {
                    const isDone = completedIds.has(ev.id);
                    if (taskFilter === 'pending' && isDone) return;
                    if (taskFilter === 'done' && !isDone) return;

                    if (!grouped[ev.date]) grouped[ev.date] = [];
                    grouped[ev.date].push(ev);
                });

                // Sort dates ascending
                const dates = Object.keys(grouped).sort();

                let html = '';
                if (dates.length === 0) {
                    html = `<div class="text-center text-muted mt-5" style="max-width:300px;margin:0 auto;">
                                <i class="bi bi-inbox fs-1 mb-2"></i>
                                <h6>No tasks found</h6>
                                <p class="small">There are no tasks matching this filter for the selected scope.</p>
                            </div>`;
                } else {
                    dates.forEach(d => {
                        const dateObj = new Date(d);
                        const dayName = dateObj.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
                        const isTodayStr = (d === todayStr) ? ' <span class="badge bg-primary ms-2 rounded-pill px-2">Today</span>' : '';

                        // Sort events in day by time
                        grouped[d].sort((a, b) => (a.sh * 60 + a.sm) - (b.sh * 60 + b.sm));

                        const rows = grouped[d].map(ev => {
                            const u = getEventStyles(ev);
                            const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                            const s = (ev.status || '').toUpperCase();
                            const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                            return `
                            <div class="task-row ${isDone ? 'done-row' : ''}" style="border-left-color:${u.color};">
                                ${ev.event_type === 'TODO' ? `<div class="t-circle ${isDone ? 't-done' : ''}" style="color:${u.color};"
                                    onclick="completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></div>` : '<div style="width:24px; flex-shrink:0;"></div>'}
                                <div class="t-info">
                                    <div class="t-title">${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}</div>
                                    <div class="t-meta"><i class="bi bi-clock me-1"></i>${timeLbl} <span class="mx-2">•</span> <i class="bi bi-geo-alt me-1"></i>${ev.loc} <span class="mx-2">•</span> <i class="bi bi-person me-1"></i>${ev.user}</div>
                                </div>
                                <div class="t-actions">
                                    <button class="btn btn-sm btn-light border rounded-pill px-3" onclick="openEditModal('${ev._uid}')" style="font-size:.75rem;">Edit</button>
                                </div>
                            </div>`;
                        }).join('');

                        html += `
                        <div class="task-date-group">
                            <div class="task-date-lbl">${dayName}${isTodayStr}</div>
                            ${rows}
                        </div>`;
                    });
                }

                document.getElementById('main-content').innerHTML = `
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-2">
                        <span class="nav-title fs-5"><i class="bi bi-check2-square text-primary me-2"></i>Tasks &amp; To-Do</span>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="task-filter-pill mb-0 me-3">
                            <button class="${taskFilter === 'all' ? 'active' : ''}" onclick="setTaskFilter('all')">All</button>
                            <button class="${taskFilter === 'pending' ? 'active' : ''}" onclick="setTaskFilter('pending')">Pending</button>
                            <button class="${taskFilter === 'done' ? 'active' : ''}" onclick="setTaskFilter('done')">Completed</button>
                        </div>
                        <button class="task-toggle-btn active" onclick="toggleTaskView()" style="background:#e8eafd;color:#4f46e5;border-color:#c7d2fe;">
                            <i class="bi bi-calendar3"></i>
                            <span class="tt-tip">Switch to Calendar</span>
                        </button>
                        <button class="btn btn-primary btn-sm px-3" onclick="bsModal.show()">
                            <i class="bi bi-plus-lg me-1"></i>Add Task
                        </button>
                    </div>
                </div>
                <div class="task-view-wrap bg-light">
                    <div style="max-width:800px;margin:0 auto;">
                        ${html}
                    </div>
                </div>`;
                return;
            }

            // ── DAY VIEW ──────────────────────────────────────────
            if (currentView === 'day') {
                const sd = selectedDate;
                const sdStr = dStr(sd);
                const isToday = sdStr === todayStr;
                const dayName = DAY_NAMES[sd.getDay()];
                const dateNum = sd.getDate();
                const navTitle = sd.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

                // Hour labels
                const hourLabels = Array.from({ length: END_HR - START_HR }, (_, i) => {
                    const h = START_HR + i;
                    const lbl = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : `${h - 12} PM`;
                    return `<div class="cal-hour-lbl">${lbl}</div>`;
                }).join('');

                // Hour lines
                const TOTAL_H = (END_HR - START_HR) * HOUR_H;
                let lines = '';
                for (let r = 0; r < (END_HR - START_HR); r++) {
                    lines += `<div class="cal-hline"      style="top:${r * HOUR_H}px"></div>`;
                    lines += `<div class="cal-hline-half" style="top:${r * HOUR_H + HOUR_H / 2}px"></div>`;
                }

                // Events for this day
                const dayEvts = events.filter(e => e.date === sdStr);
                const placed = packEvents(dayEvts);
                const evHtml = placed.map(({ ev, slot, slots }) => {
                    const u = getEventStyles(ev);
                    const t = Math.max(topPx(ev.sh, ev.sm), 0);
                    const h = Math.max(hPx(ev.sh, ev.sm, ev.eh, ev.em), 22);
                    const wPct = 96 / slots;
                    const lPct = 2 + slot * wPct;
                    const rPct = 2 + (slots - slot - 1) * wPct;
                    const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                    const s = (ev.status || '').toUpperCase();
                    const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                    return `
                    <div class="cal-evt${isDone ? ' evt-done' : ''}" style="top:${t}px;height:${h}px;left:${lPct}%;right:${rPct}%;background:${u.bg};border-left:3px solid ${u.color};display:flex;flex-direction:column;padding-left:${ev.event_type === 'TODO' ? '17px' : '8px'};overflow:hidden;"
                         title="${ev.title} (${ev.user})\n${timeLbl}\n${ev.loc}"
                         onclick="event.stopPropagation();openEditModal('${ev._uid}')">
                        ${ev.event_type === 'TODO' ? `<button class="evt-complete-btn${isDone ? ' done' : ''}" style="color:${u.color};"
                            onclick="event.stopPropagation();completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></button>` : ''}
                        <div class="evt-inner-title" style="color:${u.color};font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                            ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}
                        </div>
                        ${h > 30 ? `<div class="evt-time" style="color:${u.color};font-size:0.7rem;">${timeLbl}</div>` : ''}
                        <div style="font-size:.72rem;color:${u.color};opacity:.7;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"><i class="bi bi-person me-1"></i>${ev.user}</div>
                    </div>`;
                }).join('');

                // Current time
                const nowH = today.getHours(), nowM = today.getMinutes();
                const nowTop = topPx(nowH, nowM);
                const showNow = isToday && nowH >= START_HR && nowH < END_HR;
                const nowHtml = showNow ? `<div class="now-dot" style="top:${nowTop}px;"></div><div class="now-line" style="top:${nowTop}px;"></div>` : '';

                document.getElementById('main-content').innerHTML = `
                <!-- Toolbar -->
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-2">
                        <button class="nav-btn" onclick="navWeek(-1)" title="Previous day"><i class="bi bi-chevron-left"></i></button>
                        <button class="nav-btn" onclick="navWeek(1)"  title="Next day"><i class="bi bi-chevron-right"></i></button>
                        <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                        <span class="nav-title">${navTitle}</span>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="view-pill">
                            <button class="active">Day</button>
                            <button onclick="setView('week')">Week</button>
                            <button onclick="setView('month')">Month</button>
                        </div>
                        <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()">
                            <i class="bi bi-ui-checks"></i>
                            <span class="tt-tip">Switch to Tasks</span>
                        </button>
                    </div>
                </div>

                <div class="cal-wrapper">
                    ${buildSidebar()}
                    <!-- Day calendar -->
                    <div class="cal-root">
                        <!-- Day header: single column -->
                        <div class="cal-day-header-row" style="grid-template-columns:56px 1fr;">
                            <div class="cal-gutter-head"></div>
                            <div class="cal-dh${isToday ? ' today' : ''}" style="flex:1;">
                                <div class="dn">${dayName}</div>
                                ${isToday ? `<div class="today-dot">${dateNum}</div>` : `<div class="dd">${dateNum}</div>`}
                            </div>
                        </div>
                        <!-- Scrollable body -->
                        <div class="cal-scroll" id="calScrollBody">
                            <div class="cal-body-inner">
                                <div class="cal-gutter">${hourLabels}</div>
                                <div style="flex:1;position:relative;height:${TOTAL_H}px;border-left:1px solid #f1f5f9;${isToday ? 'background:rgba(79,70,229,.03);' : ''}">
                                    ${lines}${evHtml}${nowHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

                const sb = document.getElementById('calScrollBody');
                if (sb) sb.scrollTop = showNow ? Math.max(nowTop - 120, 0) : HOUR_H;
                return; // exit — week view not needed
            }

            // ── MONTH VIEW ─────────────────────────────────────────
            if (currentView === 'month') {
                const centerDate = selectedDate || new Date();
                const mStart = new Date(centerDate.getFullYear(), centerDate.getMonth(), 1);
                let cur = addDays(mStart, -mStart.getDay()); // Sunday

                const mo1 = mStart.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
                const navTitle = mo1;

                const dayHeaders = DAY_NAMES.map(dn => `<div class="cal-dh"><div class="dn">${dn}</div></div>`).join('');

                let rowsHtml = '';
                for (let r = 0; r < 6; r++) {
                    let cellsHtml = '';
                    for (let c = 0; c < 7; c++) {
                        const ds = dStr(cur);
                        const isToday = ds === todayStr;
                        const isCurMonth = cur.getMonth() === mStart.getMonth();

                        const dayEvts = events.filter(e => e.date === ds);
                        const evHtml = dayEvts.slice(0, 4).map(ev => {
                            const u = getEventStyles(ev);
                            const s = (ev.status || '').toUpperCase();
                            const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                            const icon = ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : '';
                            return `<div class="month-evt ${isDone ? 'evt-done' : ''}" style="background:${u.bg}; border-left:2px solid ${u.color}; color:${u.color};" onclick="event.stopPropagation();openEditModal('${ev._uid}')">${fmtH(ev.sh, ev.sm).replace(' AM', 'a').replace(' PM', 'p')} ${icon}${ev.title}</div>`;
                        }).join('');
                        const extra = dayEvts.length > 4 ? `<div class="month-evt-more">+${dayEvts.length - 4} more</div>` : '';

                        cellsHtml += `
                        <div class="month-cell ${!isCurMonth ? 'off-month' : ''} ${isToday ? 'today-cell' : ''}" onclick="selectDay('${ds}')">
                            <div class="month-cell-num ${isToday ? 'today-num' : ''}">${cur.getDate()}</div>
                            <div class="month-cell-evts">${evHtml}${extra}</div>
                        </div>`;
                        cur = addDays(cur, 1);
                    }
                    rowsHtml += `<div class="month-row">${cellsHtml}</div>`;
                    if (cur.getMonth() !== mStart.getMonth() && cur > mStart) {
                        break;
                    }
                }

                document.getElementById('main-content').innerHTML = `
                <!-- Toolbar -->
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-2">
                        <button class="nav-btn" onclick="navMonth(-1)" title="Previous month"><i class="bi bi-chevron-left"></i></button>
                        <button class="nav-btn" onclick="navMonth(1)"  title="Next month"><i class="bi bi-chevron-right"></i></button>
                        <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                        <span class="nav-title">${navTitle}</span>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="view-pill">
                            <button onclick="setView('day')">Day</button>
                            <button onclick="setView('week')">Week</button>
                            <button class="active">Month</button>
                        </div>
                        <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()"><i class="bi bi-ui-checks"></i></button>
                    </div>
                </div>
                <div class="cal-wrapper">
                    ${buildSidebar()}
                    <div class="cal-root">
                        <!-- header -->
                        <div class="cal-day-header-row month-header" style="height:auto;">
                            <div class="cal-gutter-head" style="width:16px;"></div>
                            ${dayHeaders}
                        </div>
                        <div class="cal-scroll month-scroll">
                            <div class="month-grid" style="padding-left:16px;">
                                ${rowsHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
                return;
            }

            // ── WEEK VIEW (continued below) ───────────────────────


            // Week date range label
            const wEnd = addDays(weekStart, 6);
            const mo1 = weekStart.toLocaleDateString('en-IN', { month: 'long' });
            const mo2 = wEnd.toLocaleDateString('en-IN', { month: 'long' });
            const yr = wEnd.getFullYear();
            const navTitle = (mo1 === mo2)
                ? `${mo1} ${yr}`
                : `${mo1} – ${mo2} ${yr}`;

            // Day header cells — clicking a date number opens day view
            const dayHeaders = Array.from({ length: 7 }, (_, i) => {
                const d = addDays(weekStart, i);
                const ds = dStr(d);
                const isToday = ds === todayStr;
                const numHtml = isToday
                    ? `<div class="today-dot" onclick="selectDay('${ds}')" style="cursor:pointer;">${d.getDate()}</div>`
                    : `<div class="dd" onclick="selectDay('${ds}')" style="cursor:pointer;font-size:1.35rem;font-weight:700;color:#334155;transition:color .15s;" onmouseover="this.style.color='#4f46e5'" onmouseout="this.style.color='#334155'">${d.getDate()}</div>`;
                return `<div class="cal-dh${isToday ? ' today' : ''}"><div class="dn">${DAY_NAMES[i]}</div>${numHtml}</div>`;
            }).join('');

            // Hour labels
            const hourLabels = Array.from({ length: END_HR - START_HR }, (_, i) => {
                const h = START_HR + i;
                const lbl = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : `${h - 12} PM`;
                return `<div class="cal-hour-lbl">${lbl}</div>`;
            }).join('');

            // Now line position
            const nowH = today.getHours();
            const nowM = today.getMinutes();
            const nowTop = topPx(nowH, nowM);
            const showNow = nowH >= START_HR && nowH < END_HR;

            // Day columns
            const TOTAL_H = (END_HR - START_HR) * HOUR_H;
            const colsHtml = Array.from({ length: 7 }, (_, i) => {
                const d = addDays(weekStart, i);
                const ds = dStr(d);
                const isToday = ds === todayStr;

                // Hour lines with click-to-create capability
                let lines = '';
                for (let r = 0; r < (END_HR - START_HR); r++) {
                    const h = START_HR + r;
                    const hStr = h.toString().padStart(2, '0');
                    lines += `<div class="cal-hline"      style="top:${r * HOUR_H}px; height:${HOUR_H / 2}px; pointer-events:auto; cursor:pointer;" onclick="openCreateModal('${ds}', '${hStr}:00', '${hStr}:30')"></div>`;
                    lines += `<div class="cal-hline-half" style="top:${r * HOUR_H + HOUR_H / 2}px; height:${HOUR_H / 2}px; pointer-events:auto; cursor:pointer;" onclick="openCreateModal('${ds}', '${hStr}:30', '${(h + 1).toString().padStart(2, '0')}:00')"></div>`;
                }

                // Events for this day — handle robust overlap packing
                const dayEvts = events.filter(e => e.date === ds);
                const placed = packEvents(dayEvts);

                const evHtml = placed.map(({ ev, slot, slots }) => {
                    const u = getEventStyles(ev);
                    const t = Math.max(topPx(ev.sh, ev.sm), 0);
                    const h = Math.max(hPx(ev.sh, ev.sm, ev.eh, ev.em), 22);
                    const w = 96 / slots;
                    const l = 2 + slot * w;
                    const r = 2 + (slots - slot - 1) * w;
                    const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                    const s = (ev.status || '').toUpperCase();
                    const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                    return `
            <div class="cal-evt${isDone ? ' evt-done' : ''}" title="${ev.title} (${ev.user})\n${timeLbl}\n${ev.loc}"
                style="top:${t}px;height:${h}px;left:${l}%;width:${w}%;background:${u.bg};border-left:3px solid ${u.color};padding-left:${ev.event_type === 'TODO' ? '17px' : '8px'};min-width:40px;display:flex;flex-direction:column;"
                onclick="event.stopPropagation();openEditModal('${ev._uid}')">
                ${ev.event_type === 'TODO' ? `<button class="evt-complete-btn${isDone ? ' done' : ''}" style="color:${u.color};"
                    onclick="event.stopPropagation();completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></button>` : ''}
                <div class="evt-inner-title" style="color:${u.color};font-size:.7rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}
                </div>
                ${h > 30 ? `<div class="evt-time" style="font-size:0.6rem;white-space:nowrap;overflow:hidden;">${timeLbl}</div>` : ''}
                <div class="evt-user" style="color:${u.color};">${u.initials}</div>
            </div>`;
                }).join('');

                const nowHtml = (isToday && showNow && nowTop >= 0 && nowTop <= TOTAL_H) ? `
            <div class="now-dot" style="top:${nowTop}px;"></div>
            <div class="now-line" style="top:${nowTop}px;"></div>` : '';

                return `
        <div class="cal-col${isToday ? ' today-col' : ''}" style="height:${TOTAL_H}px; position:relative;">
            ${lines}${evHtml}${nowHtml}
        </div>`;
            }).join('');

            // Build the full calendar HTML
            document.getElementById('main-content').innerHTML = `
        <!-- Toolbar -->
        <div class="cal-toolbar">
            <div class="d-flex align-items-center gap-2">
                <button class="nav-btn" title="Previous week" onclick="navWeek(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="nav-btn" title="Next week"     onclick="navWeek(1)"><i class="bi bi-chevron-right"></i></button>
                <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                <span class="nav-title">${navTitle}</span>
            </div>
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <!-- View toggle -->
                <div class="view-pill">
                    <button class="${currentView === 'day' ? 'active' : ''}"   onclick="setView('day')">Day</button>
                    <button class="${currentView === 'week' ? 'active' : ''}"  onclick="setView('week')">Week</button>
                    <button class="${currentView === 'month' ? 'active' : ''}" onclick="setView('month')">Month</button>
                </div>
                <!-- Switch to Tasks icon button -->
                <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()">
                    <i class="bi bi-ui-checks"></i>
                    <span class="tt-tip">Switch to Tasks</span>
                </button>
            </div>
        </div>

        <div class="cal-wrapper">
            ${buildSidebar()}
            <!-- Calendar -->
            <div class="cal-root">
                <!-- Day header row -->
                <div class="cal-day-header-row">
                    <div class="cal-gutter-head"></div>
                    ${dayHeaders}
                </div>
                <!-- Scrollable body -->
                <div class="cal-scroll" id="calScrollBody">
                    <div class="cal-body-inner">
                        <div class="cal-gutter">${hourLabels}</div>
                        <div class="cal-cols">${colsHtml}</div>
                    </div>
                </div>
            </div>
        </div>`;

            // Scroll to 8 AM on initial load
            const sb = document.getElementById('calScrollBody');
            if (sb) {
                // Scroll to current time if today is visible, else scroll to 8 AM
                const targetScroll = showNow ? Math.max(nowTop - 100, 0) : HOUR_H;
                sb.scrollTop = targetScroll;
            }
        }

        // ── Navigation ──────────────────────────────────────────
        function navWeek(dir) {
            miniMonthOffset = 0;
            if (currentView === 'day') {
                selectedDate = addDays(selectedDate, dir);
            } else {
                weekStart = addDays(weekStart, dir * 7);
            }
            renderCalendar();
        }
        function navMonth(dir) {
            miniMonthOffset = 0;
            const refDate = currentView === 'month' ? selectedDate : weekStart;
            selectedDate = new Date(refDate.getFullYear(), refDate.getMonth() + dir, 1);
            weekStart = getWeekStart(selectedDate);
            renderCalendar();
        }
        function navMini(dir) {
            miniMonthOffset += dir;
            renderCalendarLocal();
        }
        function goToday() {
            miniMonthOffset = 0;
            selectedDate = new Date();
            weekStart = getWeekStart(new Date());
            renderCalendar();
        }
        function setView(v) {
            miniMonthOffset = 0;
            currentView = v;
            if (v === 'month') {
                selectedDate = new Date(weekStart.getFullYear(), weekStart.getMonth(), 1);
            }
            renderCalendar();
        }

        // ── Select a day (click on day number) → switch to day view ──
        function selectDay(ds) {
            if (showTaskView) { showTaskView = false; }
            const parts = ds.split('-');
            selectedDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
            currentView = 'day';
            renderCalendar();
        }

        // ── Tasks view toggle ───────────────────────────────────
        function toggleTaskView() {
            showTaskView = !showTaskView;
            renderCalendar();
        }
        function setTaskFilter(f) {
            taskFilter = f;
            renderCalendar();
        }

        // ── Actions ─────────────────────────────────────────────
        function openCreateModal(dateStr, startStr, endStr) {
            document.getElementById('ev-date').value = dateStr;
            document.getElementById('ev-start').value = startStr;
            document.getElementById('ev-end').value = endStr;
            document.getElementById('ev-title').value = '';
            document.getElementById('ev-loc').value = '';

            document.getElementById('typeEvent').checked = true;
            toggleModalType();

            // Reconfigure modal for Create
            const saveBtn = document.getElementById('btn-save-event');
            saveBtn.onclick = saveActivity;
            saveBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Schedule';

            const delBtn = document.getElementById('btn-delete-event');
            if (delBtn) delBtn.style.display = 'none';

            bsModal.show();
        }

        function openEditModal(eventUid) {
            const ev = events.find(e => e._uid === eventUid);
            if (!ev) return;

            if (ev.event_type === 'VISIT' || ev.event_type === 'MEETING') {
                showToastMsg(`Cannot edit synced ${ev.event_type.toLowerCase()}s from the calendar.`);
                return;
            }
            if (ev.event_type === 'TODO') {
                showToastMsg('Please edit Todos from the Todo list page. You can only mark them complete here.');
                return;
            }

            document.getElementById('ev-date').value = ev.date;
            document.getElementById('ev-start').value = `${String(ev.sh).padStart(2, '0')}:${String(ev.sm).padStart(2, '0')}`;
            document.getElementById('ev-end').value = `${String(ev.eh).padStart(2, '0')}:${String(ev.em).padStart(2, '0')}`;
            document.getElementById('ev-title').value = ev.title;
            document.getElementById('ev-loc').value = ev.loc || '';

            // Try to set user if available in dropdown
            const userSelect = document.getElementById('ev-user');
            Array.from(userSelect.options).forEach(opt => {
                if (opt.value === ev.user) userSelect.value = ev.user;
            });

            document.getElementById('modal-title-text').innerText = 'Edit Event';
            document.getElementById('typeEvent').checked = true;
            toggleModalType();

            // Reconfigure modal for Update
            const saveBtn = document.getElementById('btn-save-event');
            saveBtn.onclick = () => updateEvent(ev.id);
            saveBtn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Update';

            // Show delete button
            let delBtn = document.getElementById('btn-delete-event');
            if (!delBtn) {
                // Create delete button if it doesn't exist yet
                const footer = document.querySelector('#scheduleModal .modal-footer');
                delBtn = document.createElement('button');
                delBtn.id = 'btn-delete-event';
                delBtn.className = 'btn btn-outline-danger me-auto';
                delBtn.innerHTML = '<i class="bi bi-trash"></i> Delete';
                footer.prepend(delBtn);
            }
            delBtn.style.display = 'block';
            delBtn.onclick = () => deleteEvent(ev.id);

            bsModal.show();
        }

        // ── Save event from modal ────────────────────────────────
        // ── Modal UI Toggles ─────────────────────────────────────
        function toggleModalType() {
            const isEvent = document.getElementById('typeEvent').checked;
            document.querySelectorAll('.event-fields').forEach(el => el.style.display = isEvent ? 'block' : 'none');
            document.querySelectorAll('.task-fields').forEach(el => el.style.display = isEvent ? 'none' : 'block');
            document.getElementById('modal-title-text').innerText = isEvent ? 'Schedule Event' : 'Create Task';
        }

        // ── Save logic (Unified Event/Task) ──────────────────────
        async function saveActivity() {
            const isEvent = document.getElementById('typeEvent').checked;

            if (isEvent) {
                // Event Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = document.getElementById('ev-user').value;
                const date = document.getElementById('ev-date').value;
                const start = document.getElementById('ev-start').value;
                const end = document.getElementById('ev-end').value;

                if (!title || !date || !start || !end) {
                    document.getElementById('ev-title').classList.add('is-invalid');
                    setTimeout(() => document.getElementById('ev-title').classList.remove('is-invalid'), 2000);
                    return;
                }

                if (start >= end) {
                    showToastMsg('End time must be after start time.');
                    return;
                }

                const eventData = {
                    title: title,
                    assignee_name: user,
                    date: date,
                    start_time: start,
                    end_time: end,
                    location: document.getElementById('ev-loc').value.trim() || ''
                };

                try {
                    await ApiClient.createTimetableEvent(eventData);
                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg('Activity scheduled!');
                } catch (error) {
                    console.error("Failed to schedule event", error);
                    alert("Failed to schedule event. Note: You can only edit custom API Timetable events.");
                }
            } else {
                // Task Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = document.getElementById('ev-user').value;
                const priority = document.getElementById('td-priority').value;
                const due = document.getElementById('td-due').value;
                const related = document.getElementById('td-related').value.trim();
                const desc = document.getElementById('td-desc').value.trim();

                if (!title) {
                    document.getElementById('ev-title').classList.add('is-invalid');
                    setTimeout(() => document.getElementById('ev-title').classList.remove('is-invalid'), 2000);
                    return;
                }

                const payload = {
                    title: title,
                    description: desc || null,
                    priority: priority,
                    assigned_to: user,
                    due_date: due ? new Date(due).toISOString() : null,
                    related_entity: related || null
                };

                try {
                    await ApiClient.createTodo(payload);
                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg('To-Do Task created!');
                } catch (error) {
                    console.error("Failed to create task", error);
                    alert("Failed to create task");
                }
            }
        }

        async function updateEvent(eventId) {
            const title = document.getElementById('ev-title').value.trim();
            const user = document.getElementById('ev-user').value;
            const date = document.getElementById('ev-date').value;
            const start = document.getElementById('ev-start').value;
            const end = document.getElementById('ev-end').value;

            if (!title || !date || !start || !end) return;

            if (start >= end) {
                showToastMsg('End time must be after start time.');
                return;
            }

            const eventData = {
                title: title,
                assignee_name: user,
                date: date,
                start_time: start,
                end_time: end,
                location: document.getElementById('ev-loc').value.trim() || ''
            };

            try {
                await ApiClient.updateTimetableEvent(eventId, eventData);
                bsModal.hide();
                await renderCalendar();
                showToastMsg('Activity updated!');
            } catch (error) {
                console.error("Failed to update event", error);
                alert("Failed to update event. Note: You can only edit custom Timetable events, not Visits or Meetings.");
            }
        }

        async function deleteEvent(eventId) {
            if (!confirm("Are you sure you want to delete this activity?")) return;

            try {
                await ApiClient.deleteTimetableEvent(eventId);
                bsModal.hide();
                await renderCalendar();
                showToastMsg('Activity deleted!');
            } catch (error) {
                console.error("Failed to delete event", error);
                alert("Failed to delete event. Note: You can only delete custom Timetable events.");
            }
        }

        // ── Complete event (circle button click) ────────────────────
        async function completeEvent(uid) {
            const ev = events.find(e => e._uid === uid);
            if (!ev) return;

            if (ev.event_type === 'TODO') {
                const isCompleted = ev.status === 'COMPLETED';
                const newStatus = isCompleted ? 'PENDING' : 'COMPLETED';
                try {
                    await ApiClient.updateTodo(ev.id, { status: newStatus });
                    ev.status = newStatus;
                    renderCalendarLocal();
                    if (!isCompleted) showCompletedToast(uid);
                } catch (e) {
                    console.error("Failed to update Todo status.", e);
                    showToastMsg("Failed to update Todo");
                }
            } else {
                const wasCompleted = completedIds.has(uid);
                if (wasCompleted) {
                    completedIds.delete(uid);
                    renderCalendarLocal();
                    showToastMsg('Task marked as incomplete.');
                } else {
                    completedIds.add(uid);
                    renderCalendarLocal();
                    showCompletedToast(uid);
                }
            }
        }

        // Google Calendar-style completed toast with Undo
        let _toastEl = null;
        function showCompletedToast(uid) {
            if (_toastEl) _toastEl.remove();
            _toastEl = document.createElement('div');
            _toastEl.style.cssText = [
                'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);',
                'background:#3c4043;color:#fff;padding:12px 20px;border-radius:8px;',
                'font-size:.875rem;font-weight:400;z-index:9999;',
                'display:flex;align-items:center;gap:16px;',
                'box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:260px;'
            ].join('');
            _toastEl.innerHTML = `
                <span>Task completed</span>
                <button onclick="undoComplete('${uid}')" style="background:none;border:none;color:#8ab4f8;
                    font-size:.875rem;font-weight:600;cursor:pointer;padding:0;">Undo</button>
                <button onclick="this.closest('div').remove()" style="background:none;border:none;
                    color:#9aa0a6;font-size:1rem;cursor:pointer;padding:0;line-height:1;">&times;</button>`;
            document.body.appendChild(_toastEl);
            setTimeout(() => { if (_toastEl) { _toastEl.remove(); _toastEl = null; } }, 5000);
        }

        async function undoComplete(uid) {
            const ev = events.find(e => e._uid === uid);
            if (ev && ev.event_type === 'TODO') {
                try {
                    await ApiClient.updateTodo(ev.id, { status: 'PENDING' });
                    ev.status = 'PENDING';
                } catch (e) { console.error("Could not undo Todo status:", e); }
            } else {
                completedIds.delete(uid);
            }
            if (_toastEl) { _toastEl.remove(); _toastEl = null; }
            renderCalendarLocal();
        }

        // ── Toast ────────────────────────────────────────────────
        function showToastMsg(msg) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(34,197,94,.4);';
            t.innerHTML = `<i class="bi bi-check-circle me-2"></i>${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── Auto-update current time line every minute ───────────
        setInterval(() => renderCalendar(), 60000);

        // ── Init ─────────────────────────────────────────────────
        bsModal = new bootstrap.Modal(document.getElementById('scheduleModal'));
        // Set today's date as default in modal
        document.getElementById('ev-date').value = dStr(new Date());
        renderCalendar();
    </script>
</body>

</html>
