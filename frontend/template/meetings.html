<!DOCTYPE html>
<!-- frontend/template/meetings.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meetings | SRM AI SETU</title>
    <!-- Combined Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css?v=1772780188">
    <link rel="stylesheet" href="../css/components.css?v=1772780188">
    <style>
        body {
            background: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
        }

        .page-content {
            padding: 40px;
        }

        .meeting-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s;
        }

        .meeting-card:hover {
            transform: translateY(-5px);
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.03rem;
            font-weight: 700;
        }

        .extra-small {
            font-size: 0.75rem;
        }

        .uppercase {
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="d-flex">
        <!-- Sidebar placeholder -->
        <div id="sidebar"></div>

        <div class="flex-grow-1 main-wrapper">
            <!-- Top header injected by auth.js -->

            <div class="page-content mx-auto" style="max-width: 1400px; width: 100%;">
                <header class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h2 class="page-section-title">Meetings</h2>
                        <p class="text-muted mb-0" id="meeting-count">Analyzing scheduled sessions...</p>
                    </div>
                    <button class="btn btn-primary d-flex align-items-center gap-2 rounded-pill px-4"
                        data-bs-toggle="modal" data-bs-target="#addMeetingModal">
                        <i class="bi bi-plus-lg"></i>
                        Schedule Session
                    </button>
                </header>
                <!-- Filter Panel Wrapper -->
                <div id="filter-wrapper"></div>

                <div class="card meeting-card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light bg-opacity-50">
                                    <tr>
                                        <th class="ps-4" style="width: 40px;">
                                            <input type="checkbox" class="form-check-input" id="meeting-select-all"
                                                onclick="toggleAllMeetings(this)">
                                        </th>
                                        <th class="py-3 text-muted fw-bold extra-small uppercase">Client Name</th>
                                        <th class="py-3 text-muted fw-bold extra-small uppercase">Subject & Type</th>
                                        <th class="py-3 text-muted fw-bold extra-small uppercase">Scheduled Date</th>
                                        <th class="py-3 text-muted fw-bold extra-small uppercase">Status</th>
                                        <th class="py-3 text-muted fw-bold extra-small uppercase">AI Summary</th>
                                        <th class="pe-4 py-3 text-end text-muted fw-bold extra-small uppercase">Actions
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="meetings-table">
                                    <tr>
                                        <td colspan="6" class="text-center py-5 text-muted">Loading meetings...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="addMeetingModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 24px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Schedule Meeting</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Target Client *</label>
                        <select id="m-client" class="form-select border-2"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Subject Title</label>
                        <input id="m-title" class="form-control border-2" placeholder="e.g. Project Kickoff">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <label class="form-label fw-semibold">Date *</label>
                            <input type="date" id="m-date" class="form-control border-2" required>
                        </div>
                        <div class="col">
                            <label class="form-label fw-semibold">Time</label>
                            <input type="time" id="m-time" class="form-control border-2">
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Booking Status</label>
                            <select id="m-status" class="form-select border-2">
                                <option value="OPEN">Pending Arrival</option>
                                <option value="IN_PROGRESS" selected>Confirmed / Scheduled</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Meeting Type</label>
                            <select id="m-type" class="form-select border-2">
                                <option value="In-Person">In-Person</option>
                                <option value="Google Meet">Google Meet</option>
                                <option value="Virtual">Virtual Session</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Pre-meeting Notes</label>
                        <textarea id="m-notes" class="form-control border-2" rows="3"
                            placeholder="Context for the call..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" id="save-meeting-btn">Schedule Session</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reschedule Modal -->
    <div class="modal fade" id="rescheduleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Move Session</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-4">
                    <input type="hidden" id="reschedule-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">New Date</label>
                            <input type="date" id="res-date" class="form-control border-2 shadow-none">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">New Time</label>
                            <input type="time" id="res-time" class="form-control border-2 shadow-none">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary rounded-pill px-4" onclick="confirmReschedule()">
                        Confirm Reschedule
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Summary Modal -->
    <div class="modal fade" id="aiSummaryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0"
                    style="background: linear-gradient(135deg,#2563eb,#2563eb); border-radius: 20px 20px 0 0;">
                    <div>
                        <h5 class="modal-title fw-bold text-white">
                            <i class="bi bi-robot me-2"></i>AI Meeting Summary
                        </h5>
                        <p class="text-white-50 small mb-0" id="ai-meeting-label">Analysing notes...</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="ai-summary-body">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-2">Generating AI analysis...</p>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js?v=2.3"></script>
    <script src="../js/api.js?v=2.3"></script>
    <script src="../js/auth.js?v=2.3"></script>
    <script src="../js/ui_components.js?v=20260312"></script>
    <script src="../js/app.js?v=2.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Security & Layout Init
        requireAuth();
        const sidebarElement = document.getElementById('sidebar');
        if (sidebarElement) {
            sidebarElement.innerHTML = renderSidebar('meetings');
        }
        injectTopHeader('Meetings');

        let allClients = [];

        async function loadClients() {
            try {
                allClients = await apiGet('/clients/');
                const sel = document.getElementById('m-client');
                if (!sel) return;
                const urlClient = new URLSearchParams(window.location.search).get('client_id');
                sel.innerHTML = '<option value="">-- Select Client --</option>' +
                    allClients.map(c => `<option value="${c.id}" ${c.id == urlClient ? 'selected' : ''}>${c.name}</option>`).join('');
                if (urlClient) {
                    const modal = document.getElementById('addMeetingModal');
                    if (modal) bootstrap.Modal.getOrCreateInstance(modal).show();
                }
            } catch (e) {
                console.error("Client Load Failed", e);
            }
        }

        async function loadMeetings(filters = {}) {
            try {
                // Using the new global endpoint for efficiency
                const params = new URLSearchParams();
                if (filters.client) params.append('client_id', filters.client);
                if (filters.type) params.append('meeting_type', filters.type);
                if (filters.status) params.append('status', filters.status);
                if (filters.start) params.append('start_date', filters.start);
                if (filters.end) params.append('end_date', filters.end);

                const meetings = await apiGet(`/meetings/?${params.toString()}`);
                const clientMap = {};
                allClients.forEach(c => clientMap[c.id] = c.name);

                meetings.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                const countEl = document.getElementById('meeting-count');
                if (countEl) countEl.textContent = `${meetings.length} active sessions found`;

                const statusBadge = s => {
                    const map = {
                        RESOLVED:    'bg-success bg-opacity-10 text-success border-success border-opacity-25',
                        OPEN:        'bg-warning bg-opacity-10 text-dark border-warning border-opacity-25',
                        IN_PROGRESS: 'bg-info bg-opacity-10 text-info border-info border-opacity-25',
                        BLOCKED:     'bg-danger bg-opacity-10 text-danger border-danger border-opacity-25',
                        CANCEL:      'bg-danger bg-opacity-10 text-danger border-danger border-opacity-25',
                        CANCELLED:   'bg-danger bg-opacity-10 text-danger border-danger border-opacity-25',
                    };
                    return map[s] || 'bg-secondary text-white';
                };

                const platformIcon = type => {
                    if (type === 'Google Meet' || type === 'Virtual') return '<i class="bi bi-camera-video me-2 text-primary"></i>';
                    return '<i class="bi bi-geo-alt me-2 text-muted"></i>';
                };

                const tableBody = document.getElementById('meetings-table');
                if (!tableBody) return;
                if (meetings.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No meetings found. Start by scheduling one!</td></tr>';
                    return;
                }

                tableBody.innerHTML = meetings.map(m => {
                    const clientName = clientMap[m.client_id] || `Client #${m.client_id}`;
                    const isFinished = m.status === 'RESOLVED';
                    const isCancelled = m.status === 'CANCELLED' || m.status === 'CANCEL';

                    return `
                    <tr class="border-bottom">
                        <td class="ps-4">
                            <input type="checkbox" class="form-check-input meeting-checkbox" value="${m.id}" onclick="updateSelectedCount()">
                        </td>
                        <td>
                            <div class="fw-bold text-dark">${clientName}</div>
                            <div class="text-muted extra-small">ID: ${m.id}</div>
                        </td>
                        <td>
                            <div class="d-flex align-items-center">
                                ${platformIcon(m.meeting_type)}
                                <span class="fw-medium">${m.title || 'Untitled Session'}</span>
                            </div>
                            <div class="text-muted extra-small ms-4">${m.meeting_type || 'General'}</div>
                        </td>
                        <td>
                            <div class="fw-semibold">${m.date ? new Date(m.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—'}</div>
                            <div class="text-muted extra-small">${m.date ? new Date(m.date).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '—'}</div>
                        </td>
                        <td><span class="badge status-badge border ${statusBadge(m.status)}">${m.status || 'Scheduled'}</span></td>
                        <td>
                            ${isFinished ? `
                                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="fetchAISummary(${m.id})">
                                    <i class="bi bi-robot me-1"></i>Report
                                </button>
                            ` : `<span class="text-muted small">${m.content ? m.content.substring(0, 30) + '...' : 'Pre-meeting phase'}</span>`}
                        </td>
                        <td class="pe-4 text-end">
                            <div class="dropdown">
                                <button class="btn btn-light btn-sm rounded-circle p-2 shadow-none border" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                    ${(!isFinished && !isCancelled) ? `
                                        <li><a class="dropdown-item" href="#" onclick="updateStatus(${m.id}, 'RESOLVED')"><i class="bi bi-check2-circle me-2 text-success"></i>Mark Done</a></li>
                                        <li><a class="dropdown-item" href="#" onclick="openRescheduleModal(${m.id}, '${m.date}')"><i class="bi bi-calendar2-range me-2 text-primary"></i>Reschedule</a></li>
                                        <li><a class="dropdown-item" href="#" onclick="updateStatus(${m.id}, 'CANCELLED')"><i class="bi bi-x-circle me-2 text-danger"></i>Cancel</a></li>
                                    ` : ''}
                                    ${(!m.meet_link && !isFinished && !isCancelled) ? `
                                        <li><a class="dropdown-item" href="#" onclick="initializeMeet(${m.id})"><i class="bi bi-camera-video me-2 text-info"></i>Create G-Meet</a></li>
                                    ` : m.meet_link ? `
                                        <li><a class="dropdown-item" href="${m.meet_link}" target="_blank"><i class="bi bi-link-45deg me-2"></i>Join Meet</a></li>
                                    ` : ''}
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item text-danger" href="#" onclick="deleteMeeting(${m.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error("Meetings Load Failed", e);
                const tableBody = document.getElementById('meetings-table');
                if (tableBody) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-danger">Failed to load sessions. Please try refreshing.</td></tr>';
                }
            }
        }

        // AI Summary Viewer
        window.fetchAISummary = async (id) => {
            const aiModalEl = document.getElementById('aiSummaryModal');
            if (!aiModalEl) return;
            const modal = new bootstrap.Modal(aiModalEl);
            const aiLabel = document.getElementById('ai-meeting-label');
            const aiBody = document.getElementById('ai-summary-body');
            if (aiLabel) aiLabel.textContent = `Meeting ID: ${id}`;
            if (aiBody) aiBody.innerHTML = `
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted mt-2">Generating AI analysis...</p>
                </div>`;
            modal.show();

            try {
                const result = await apiPost(`/meetings/${id}/generate-ai-summary`, {});
                const highlights = result.highlights || [];
                const nextSteps = result.next_steps || result.action_items || 'No action items found.';
                if (aiBody) aiBody.innerHTML = `
                    <div class="mb-4">
                        <h6 class="fw-bold text-primary mb-3"><i class="bi bi-lightbulb me-2"></i>Key Highlights</h6>
                        <ul class="list-group list-group-flush">
                            ${highlights.map(h => `
                                <li class="list-group-item border-0 d-flex gap-2 px-0">
                                    <i class="bi bi-check2-circle text-success mt-1 flex-shrink-0"></i>
                                    <span>${h}</span>
                                </li>`).join('')}
                        </ul>
                    </div>
                    <div class="p-3 rounded-3" style="background:#f0fdf4;border-left:4px solid #22c55e;">
                        <h6 class="fw-bold text-success mb-2"><i class="bi bi-arrow-right-circle me-2"></i>Next Steps</h6>
                        <p class="mb-0 text-dark">${nextSteps}</p>
                    </div>`;
            } catch (e) {
                if (aiBody) aiBody.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Failed to fetch AI summary: ${e?.data?.detail || e?.message || 'Unknown error'}
                    </div>`;
            }
        };

        // Action Handlers
        window.initializeMeet = async (id) => {
            try {
                await apiPost(`/meetings/${id}/initialize-meet`);
                showToast('Google Meet link generated!', 'success');
                loadMeetings();
            } catch (e) {
                showToast('Failed to generate meet link. Check permissions.', 'error');
            }
        };

        window.updateStatus = async (id, status) => {
            if (status === 'CANCELLED' && !confirm('Are you sure you want to cancel this meeting?')) return;
            try {
                await apiPatch(`/clients/meetings/${id}`, { status: status });
                showToast(`Meeting marked as ${status}`);
                loadMeetings();
            } catch (e) { showToast('Update failed', 'error'); }
        };

        window.deleteMeeting = async (id) => {
            if (!confirm('Permanently delete this meeting session?')) return;
            try {
                await apiDelete(`/clients/meetings/${id}`);
                showToast('Meeting deleted', 'success');
                loadMeetings();
            } catch (e) { showToast('Deletion failed', 'error'); }
        };

        window.openRescheduleModal = (id, currentIso) => {
            document.getElementById('reschedule-id').value = id;
            if (currentIso && currentIso !== 'null' && currentIso !== 'undefined') {
                const d = new Date(currentIso);
                document.getElementById('res-date').value = d.toISOString().split('T')[0];
                document.getElementById('res-time').value = d.toTimeString().split(' ')[0].substring(0, 5);
            }
            new bootstrap.Modal(document.getElementById('rescheduleModal')).show();
        };

        window.confirmReschedule = async () => {
            const id = document.getElementById('reschedule-id').value;
            const d = document.getElementById('res-date').value;
            const t = document.getElementById('res-time').value;

            if (!d || !t) return showToast('Please select both date and time.', 'error');

            try {
                const new_date = `${d}T${t}:00`;
                await apiPost(`/meetings/${id}/reschedule`, { new_date });
                showToast('Meeting rescheduled successfully', 'success');
                bootstrap.Modal.getInstance(document.getElementById('rescheduleModal')).hide();
                loadMeetings();
            } catch (e) {
                // Surface the real error from the backend
                let msg = 'Reschedule failed.';
                if (e && e.data && e.data.detail) {
                    msg = e.data.detail;
                } else if (e && e.message) {
                    msg = e.message;
                }
                showToast('Error: ' + msg, 'error');
                console.error('Reschedule error:', e);
            }
        };

        document.getElementById('save-meeting-btn').addEventListener('click', async () => {
            const client_id = document.getElementById('m-client').value;
            const title = document.getElementById('m-title').value;
            const date = document.getElementById('m-date').value;
            const time = document.getElementById('m-time').value;

            if (!client_id || !date) return showToast('Client and Date are required.', 'warning');

            const payload = {
                title: title || 'Meeting',
                date: `${date}T${time || '00:00'}:00`,
                meeting_type: document.getElementById('m-type').value,
                status: document.getElementById('m-status').value,
                content: document.getElementById('m-notes').value
            };

            try {
                await apiPost(`/clients/${client_id}/meetings`, payload);
                showToast('Meeting scheduled!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('addMeetingModal')).hide();
                loadMeetings();
            } catch (e) { showToast('Scheduling failed', 'error'); }
        });

        function toggleAllMeetings(master) {
            document.querySelectorAll('.meeting-checkbox').forEach(cb => cb.checked = master.checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll('.meeting-checkbox:checked').length;
            window.updateBulkActionBar({
                count: selected,
                onDelete: () => batchDeleteMeetings(),
                onCancel: () => {
                    document.querySelectorAll('.meeting-checkbox').forEach(cb => cb.checked = false);
                    document.getElementById('meeting-select-all').checked = false;
                    updateSelectedCount();
                }
            });
        }

        async function batchDeleteMeetings() {
            const selectedIds = Array.from(document.querySelectorAll('.meeting-checkbox:checked')).map(cb => parseInt(cb.value));
            if (!selectedIds.length) return;

            const u = getUser();
            if (u.role !== 'ADMIN') {
                showToast('Only Admins can perform bulk delete', 'error');
                return;
            }

            if (!confirm(`Delete ${selectedIds.length} meetings permanently?`)) return;

            try {
                await apiPost('/meetings/batch-delete', {
                    method: 'POST',
                    body: selectedIds
                });
                showToast(`Removed ${selectedIds.length} sessions`, 'success');
                loadMeetings();
            } catch (err) {
                showToast('Bulk delete failed', 'error');
            }
        }

        // Initialize Filters
        function initFilters() {
            renderFilterPanel({
                containerId: 'filter-wrapper',
                filters: [
                    { type: 'select', label: 'Client', id: 'filter-client', options: [{ value: 'ALL', label: 'All Clients' }, ...allClients.map(c => ({ value: c.id, label: c.name }))] },
                    { type: 'select', label: 'Type', id: 'filter-type', options: [
                        { value: 'ALL', label: 'All Types' },
                        { value: 'In-Person', label: 'In-Person' },
                        { value: 'Google Meet', label: 'Google Meet' },
                        { value: 'Virtual', label: 'Virtual' }
                    ]},
                    { type: 'select', label: 'Status', id: 'filter-status', options: [
                        { value: 'ALL', label: 'All Status' },
                        { value: 'OPEN', label: 'Open' },
                        { value: 'IN_PROGRESS', label: 'In Progress' },
                        { value: 'RESOLVED', label: 'Resolved' },
                        { value: 'CANCELLED', label: 'Cancelled' }
                    ]},
                    { type: 'date', label: 'Start Date', id: 'filter-start' },
                    { type: 'date', label: 'End Date', id: 'filter-end' }
                ],
                onApply: (data) => loadMeetings({
                    client: data['client'],
                    type: data['type'],
                    status: data['status'],
                    start: data['start'],
                    end: data['end']
                }),
                onReset: () => loadMeetings()
            });
        }

        // Initialize
        loadClients().then(() => {
            initFilters();
            loadMeetings();
        });
    </script>
</body>

</html>
