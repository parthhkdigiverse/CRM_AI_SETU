<!DOCTYPE html>
<!-- frontend/template/projects.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects — SRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
</head>

<body class="bg-light">
    <div class="d-flex" style="height:100vh;overflow:hidden;">
        <div id="sidebar"></div>
        <div class="flex-grow-1" style="min-width:0;overflow-y:auto;">
            <div class="page-content">
                <div id="main-content">
                    <!-- Handled by app.js?v=2.9 renderProjects() -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js?v=1772780187"></script>
    <script src="../js/ui_components.js?v=1772780187"></script>
    <script src="../js/auth.js?v=1772780187"></script>
    <script src="../js/app.js?v=1772780187"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('projects');
        injectTopHeader('Projects');

        // Load real view logic
        if (window.loadView) {
            window.loadView('projects').then(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const highlightId = urlParams.get('id');
                if (highlightId) {
                    setTimeout(() => {
                        // In projects, we might not have a simple row. Look for the project card by finding the edit button
                        const card = document.querySelector(`div.card:has(button[onclick*="openProjectUpdateModal(${highlightId},"])`);
                        if (card) {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            card.classList.add('highlight-row');
                        }
                    }, 800);
                }
            });
        }
    </script>
</body>

</html>
