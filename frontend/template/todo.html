<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To-Do List — CRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
    <style>
        body {
            background: #f1f5f9;
        }

        .smaller {
            font-size: 0.75rem;
        }

        .badge-purple-light {
            background: #f5f3ff;
            color: #7c3aed;
            border: 1px solid #ede9fe;
        }

        .badge-green-light {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .badge-yellow-light {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .badge-info-custom {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        .btn-ghost:hover {
            background: #f8fafc;
        }

        .stat-card {
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .07);
            padding: 20px 24px;
        }

        .stat-card .label {
            font-size: 0.78rem;
            color: #64748b;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1;
        }

        .todo-table thead th {
            font-size: 0.72rem;
            letter-spacing: .05em;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
        }

        .todo-table tbody tr:hover {
            background: #f8fafc;
        }

        .todo-table td {
            vertical-align: middle;
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .avatar-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Modal */
        .modal-custom-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 1050;
            align-items: center;
            justify-content: center;
        }

        .modal-custom-overlay.show {
            display: flex;
        }

        .modal-custom-box {
            background: #fff;
            border-radius: 18px;
            padding: 32px 28px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .18);
            position: relative;
            animation: fadeSlideIn .22s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-custom-box h5 {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .modal-custom-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #94a3b8;
            cursor: pointer;
            line-height: 1;
        }

        .modal-custom-close:hover {
            color: #334155;
        }

        /* ── Switch to Calendar view button ─────────────────────── */
        .task-toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #5f6368;
            font-size: 1rem;
            position: relative;
            transition: background .15s, color .15s;
            text-decoration: none;
        }

        .task-toggle-btn:hover {
            background: #f1f5f9;
            color: #4f46e5;
        }

        .task-toggle-btn.active {
            background: #e8eafd !important;
            color: #4f46e5 !important;
            border-color: #c7d2fe !important;
        }

        .task-toggle-btn .tt-tip {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #3c4043;
            color: #fff;
            font-size: .72rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
            z-index: 20;
        }

        .task-toggle-btn:hover .tt-tip {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- ─── Layout ─────────────────────────────────────────── -->
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <div id="main-content"></div>
            </div>
        </div>
    </div>

    <!-- ─── Unified Schedule/Task Modal ──────────────────────── -->
    <div class="modal-custom-overlay" id="taskModal">
        <div class="modal-custom-box" style="max-width:550px;">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-calendar-plus-fill text-primary me-2"></i><span id="modal-title-text">Create
                        Task</span>
                </h5>
                <button class="modal-custom-close position-static m-0" onclick="closeModal()">&times;</button>
            </div>

            <!-- Type Toggle -->
            <div class="d-flex bg-light p-1 rounded-3 mb-4" style="border: 1px solid #e2e8f0;">
                <input type="radio" class="btn-check" name="activityType" id="typeEvent" value="EVENT"
                    autocomplete="off" onchange="toggleModalType()">
                <label class="btn btn-outline-primary border-0 flex-1 w-50 fw-semibold" for="typeEvent">Event /
                    Meeting</label>

                <input type="radio" class="btn-check" name="activityType" id="typeTask" value="TASK" checked
                    autocomplete="off" onchange="toggleModalType()">
                <label class="btn btn-outline-primary border-0 flex-1 w-50 fw-semibold" for="typeTask">To-Do
                    Task</label>
            </div>

            <div class="row g-3">
                <!-- Common Fields -->
                <div class="col-12">
                    <label class="form-label fw-semibold small">Title <span class="text-danger">*</span></label>
                    <input type="text" id="ev-title" class="form-control" placeholder="What needs to be done?">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold small">Assignee</label>
                    <select id="ev-user" class="form-select">
                        <option value="">— Loading users... —</option>
                    </select>
                </div>

                <!-- EVENT specific fields -->
                <div class="col-md-6 event-fields" style="display: none;">
                    <label class="form-label fw-semibold small">Date <span class="text-danger">*</span></label>
                    <input type="date" id="ev-date" class="form-control">
                </div>
                <div class="col-md-6 event-fields" style="display: none;">
                    <label class="form-label fw-semibold small">Start Time <span class="text-danger">*</span></label>
                    <input type="time" id="ev-start" class="form-control">
                </div>
                <div class="col-md-6 event-fields" style="display: none;">
                    <label class="form-label fw-semibold small">End Time <span class="text-danger">*</span></label>
                    <input type="time" id="ev-end" class="form-control">
                </div>
                <div class="col-12 event-fields" style="display: none;">
                    <label class="form-label fw-semibold small">Location / Notes</label>
                    <input type="text" id="ev-loc" class="form-control" placeholder="Office, online, etc.">
                </div>

                <!-- TASK specific fields -->
                <div class="col-md-6 task-fields">
                    <label class="form-label fw-semibold small">Priority</label>
                    <select id="td-priority" class="form-select">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                    </select>
                </div>
                <div class="col-md-6 task-fields">
                    <label class="form-label fw-semibold small">Due Date & Time</label>
                    <input type="datetime-local" id="td-due" class="form-control">
                </div>
                <div class="col-12 task-fields">
                    <label class="form-label fw-semibold small">Related Entity</label>
                    <input type="text" id="td-related" class="form-control" placeholder="Project, Client or Lead name">
                </div>
                <div class="col-12 task-fields">
                    <label class="form-label fw-semibold small">Description</label>
                    <textarea id="td-desc" class="form-control" rows="2" placeholder="Additional details..."></textarea>
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4 pt-3 border-top">
                <button class="btn btn-outline-danger me-auto" id="btn-delete-event" style="display: none;"
                    onclick="deleteTask(editingTaskId)">
                    <i class="bi bi-trash"></i> Delete
                </button>
                <button class="btn btn-light border" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary px-4" onclick="saveActivity()"><i
                        class="bi bi-check-lg me-1"></i>Save</button>
            </div>
        </div>
    </div>

    <!-- ─── Scripts ───────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js?v=1772780187"></script>
    <script src="../js/ui_components.js?v=1772780187"></script>
    <script src="../js/auth.js?v=2.3"></script>

    <script>
        // ── Auth & Sidebar ──────────────────────────────────────
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('todo');
        injectTopHeader('To-Do List');

        // ── Mock data ───────────────────────────────────────────
        const today = new Date();
        const tomorrow = new Date(Date.now() + 86400000);
        const yesterday = new Date(Date.now() - 86400000);

        const fmt = d => d.toISOString().replace('T', ' ').slice(0, 16);

        let tasks = [];

        // ── Helpers ─────────────────────────────────────────────
        function formatRelativeDate(dateStr) {
            if (!dateStr) return 'No due date';
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.round((date - now) / 86400000);
            const timeStr = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
            let label = '';
            if (diffDays === 0) label = 'Today';
            else if (diffDays === 1) label = 'Tomorrow';
            else if (diffDays === -1) label = 'Yesterday';
            else label = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            return `${label}, ${timeStr}`;
        }

        function initials(name) {
            if (!name) return 'U';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function sevBadge(s) {
            if (!s) return `<span class="badge bg-secondary rounded-pill px-3">Unknown</span>`;
            const map = { HIGH: 'bg-danger', MEDIUM: 'bg-warning text-dark', LOW: 'bg-success' };
            return `<span class="badge ${map[s] || 'bg-secondary'} rounded-pill px-3">${s.charAt(0) + s.slice(1).toLowerCase()}</span>`;
        }

        function statBadge(s) {
            if (s === 'PENDING') return '<span class="badge badge-purple-light rounded-pill px-3">Pending</span>';
            if (s === 'IN_PROGRESS') return '<span class="badge badge-info-custom rounded-pill px-3">In Progress</span>';
            if (s === 'COMPLETED') return '<span class="badge badge-green-light rounded-pill px-3">Completed</span>';
            return `<span class="badge bg-secondary rounded-pill px-3">${s || 'Unknown'}</span>`;
        }

        // ── Render ──────────────────────────────────────────────
        async function loadTasks() {
            try {
                tasks = await ApiClient.getTodos();
                renderTodo();
            } catch (error) {
                console.error("Failed to load tasks", error);
            }
        }

        function renderTodo() {
            const total = tasks.length;
            const highPri = tasks.filter(t => t.priority === 'HIGH').length;
            const ongoing = tasks.filter(t => t.status === 'IN_PROGRESS').length;
            const completed = tasks.filter(t => t.status === 'COMPLETED').length;

            const rows = tasks.map(t => {
                const assignee = t.assigned_to || 'Unassigned';
                const related = t.related_entity || '—';
                return `
            <tr id="row-${t.id}">
                <td>
                    <div class="fw-semibold text-dark" style="font-size:0.92rem;">${t.title}</div>
                    <div class="text-muted smaller mt-1">Assigned: ${assignee}</div>
                </td>
                <td>${sevBadge(t.priority)}</td>
                <td>${statBadge(t.status)}</td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar-circle">${initials(assignee)}</div>
                        <span class="small">${assignee}</span>
                    </div>
                </td>
                <td class="small text-secondary" style="white-space:nowrap;">
                    <i class="bi bi-clock me-1"></i>${formatRelativeDate(t.due_date)}
                </td>
                <td class="small text-muted">${related}</td>
                <td class="text-end">
                    <div class="dropdown">
                        <button class="btn btn-ghost btn-sm px-2 py-1" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-2" style="border-radius:12px;min-width:160px;">
                            <li><a class="dropdown-item rounded py-2 small" href="javascript:void(0)" onclick="markComplete(${t.id})"><i class="bi bi-check-circle me-2 text-success"></i>Mark Completed</a></li>
                            <li><a class="dropdown-item rounded py-2 small" href="#"><i class="bi bi-pencil me-2 text-info"></i>Edit Task</a></li>
                            <li><a class="dropdown-item rounded py-2 small" href="javascript:void(0)" onclick="alert('Upload evidence triggered')"><i class="bi bi-upload me-2 text-primary"></i>Upload Evidence</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item rounded py-2 small text-danger" href="javascript:void(0)" onclick="deleteTask(${t.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                        </ul>
                    </div>
                </td>
            </tr>`;
            }).join('');

            document.getElementById('main-content').innerHTML = `
            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h2 class="page-section-title">To-Do List</h2>
                    <p class="text-muted small mb-0">Manage and <span class="fw-semibold text-primary">track</span> your personal and team tasks.</p>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <a href="timetable.html" class="task-toggle-btn active text-decoration-none">
                        <i class="bi bi-calendar3"></i>
                        <span class="tt-tip">Switch to Calendar</span>
                    </a>
                    <button class="btn btn-primary d-flex align-items-center gap-2 px-4" onclick="openModal()" style="height:32px; border-radius:8px; font-size:0.85rem; padding-top:0; padding-bottom:0;">
                        <i class="bi bi-plus-lg"></i> Add New Task
                    </button>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-lg-3">
                    <div class="stat-card text-center">
                        <div class="label">Total Tasks</div>
                        <div class="value">${total}</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card text-center">
                        <div class="label">High Priority</div>
                        <div class="value text-danger">${highPri}</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card text-center">
                        <div class="label">Ongoing</div>
                        <div class="value text-info">${ongoing}</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card text-center">
                        <div class="label">Completed</div>
                        <div class="value text-success">${completed}</div>
                    </div>
                </div>
            </div>

            <!-- Task Table -->
            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius:14px;">
                <div class="table-responsive">
                    <table class="table todo-table mb-0">
                        <thead>
                            <tr>
                                <th class="px-4">Task Title</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th>Due Date</th>
                                <th>Related Entity</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows || `<tr><td colspan="7" class="text-center text-muted py-4">No tasks found. Create a new task to get started!</td></tr>`}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // ── Modal helpers ────────────────────────────────────────
        function openModal() {
            document.getElementById('taskModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('taskModal').classList.remove('show');
            // Reset all form fields safely
            ['ev-title', 'td-related', 'td-desc', 'td-due', 'ev-loc', 'ev-date', 'ev-start', 'ev-end'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            const pri = document.getElementById('td-priority');
            if (pri) pri.value = 'MEDIUM';
        }
        function toggleModalType() {
            const isEvent = document.getElementById('typeEvent').checked;
            document.querySelectorAll('.event-fields').forEach(el => el.style.display = isEvent ? 'block' : 'none');
            document.querySelectorAll('.task-fields').forEach(el => el.style.display = isEvent ? 'none' : 'block');
            document.getElementById('modal-title-text').innerText = isEvent ? 'Schedule Event' : 'Create Task';
        }

        async function saveActivity() {
            const isEvent = document.getElementById('typeEvent').checked;

            if (isEvent) {
                // Event Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = document.getElementById('ev-user').value;
                const date = document.getElementById('ev-date').value;
                const start = document.getElementById('ev-start').value;
                const end = document.getElementById('ev-end').value;

                if (!title || !date || !start || !end) {
                    document.getElementById('ev-title').style.borderColor = '#ef4444';
                    setTimeout(() => document.getElementById('ev-title').style.borderColor = '', 2000);
                    return;
                }

                if (start >= end) {
                    alert('End time must be after start time.');
                    return;
                }

                const eventData = {
                    title: title,
                    assignee_name: user,
                    date: date,
                    start_time: start,
                    end_time: end,
                    location: document.getElementById('ev-loc').value.trim() || ''
                };

                try {
                    await ApiClient.createTimetableEvent(eventData);
                    closeModal();
                    alert('Activity scheduled!'); // Simple alert for To-Do page
                } catch (error) {
                    console.error("Failed to schedule event", error);
                    alert("Failed to schedule event.");
                }
            } else {
                // Task Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = document.getElementById('ev-user').value;
                const priority = document.getElementById('td-priority').value;
                const due = document.getElementById('td-due').value;
                const related = document.getElementById('td-related').value.trim();
                const desc = document.getElementById('td-desc').value.trim();

                if (!title) {
                    document.getElementById('ev-title').style.borderColor = '#ef4444';
                    setTimeout(() => document.getElementById('ev-title').style.borderColor = '', 2000);
                    return;
                }

                const payload = {
                    title: title,
                    description: desc || null,
                    priority: priority,
                    assigned_to: user,
                    due_date: due ? new Date(due).toISOString() : null,
                    related_entity: related || null
                };

                try {
                    await ApiClient.createTodo(payload);
                    closeModal();
                    loadTasks();

                    const toast = document.createElement('div');
                    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:10px;font-size:0.875rem;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(34,197,94,.4);';
                    toast.innerHTML = '<i class="bi bi-check-circle me-2"></i>Task created successfully!';
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3000);
                } catch (error) {
                    console.error("Failed to create task", error);
                    const detail = error?.data?.detail || (typeof error?.data === 'string' ? error.data : null) || error?.message || 'Failed to create task';
                    alert(detail);
                }
            }
        }
        async function deleteTask(id) {
            if (!confirm('Delete this task?')) return;
            try {
                await ApiClient.deleteTodo(id);
                loadTasks();
            } catch (error) {
                console.error("Failed to delete task", error);
                alert("Failed to delete task");
            }
        }
        async function markComplete(id) {
            try {
                await ApiClient.updateTodo(id, { status: 'COMPLETED' });
                loadTasks();
            } catch (error) {
                console.error("Failed to update task", error);
            }
        }

        // Close modal on backdrop click
        document.getElementById('taskModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // ── Load assignees into dropdown ────────────────────────
        ApiClient.getEmployees().then(emps => {
            const sel = document.getElementById('ev-user');
            sel.innerHTML = '<option value="">— Unassigned —</option>' +
                emps.map(e => `<option value="${e.name || e.email}">${e.name || e.email}</option>`).join('');
        }).catch(() => {
            // Fallback: keep loading placeholder but don't block
            document.getElementById('ev-user').innerHTML = '<option value="">— Unassigned —</option>';
        });

        // ── Init ─────────────────────────────────────────────────
        loadTasks();
    </script>
</body>

</html>
