<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Feedback — CRM AI SETU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crm-primary: #4e73df;
            --crm-bg: #f8f9fc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--crm-bg);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .feedback-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border: none;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--crm-primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.1);
            border-color: var(--crm-primary);
            background-color: #fff;
        }

        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            font-size: 1.5rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating input:checked~label,
        .star-rating label:hover,
        .star-rating label:hover~label {
            color: #ffbc00;
        }

        .btn-submit {
            background: var(--crm-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #3e5fbd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.3);
        }

        .agent-info {
            background: rgba(78, 115, 223, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .agent-avatar {
            width: 45px;
            height: 45px;
            background: var(--crm-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 40px;
        }

        .success-icon {
            font-size: 5rem;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: scaleUp 0.5s ease-out;
        }

        @keyframes scaleUp {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="feedback-card">
        <div class="brand-logo">CRM AI SETU</div>
        <h4 class="text-center mb-4">Share Your Feedback</h4>

        <div id="agent-display" class="agent-info">
            <div class="agent-avatar" id="agent-initials">?</div>
            <div>
                <div class="text-muted small">Assisted By</div>
                <div class="fw-bold" id="agent-name">Sales Executive</div>
            </div>
        </div>

        <form id="feedback-form">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="client-name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" id="client-mobile" placeholder="Enter mobile number" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Shop Name / Business Name *</label>
                <input type="text" class="form-control" id="shop-name" placeholder="Enter shop name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Product *</label>
                <select class="form-select" id="feedback-product" required>
                    <option value="" selected disabled>Select Product</option>
                    <option value="CRM Enterprise">CRM Enterprise</option>
                    <option value="AI Analytics">AI Analytics</option>
                    <option value="ERP Solution">ERP Solution</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Rating</label>
                <div class="star-rating" id="product-stars">
                    <input type="radio" name="product_rating" id="p5" value="5"><label for="p5">★</label>
                    <input type="radio" name="product_rating" id="p4" value="4"><label for="p4">★</label>
                    <input type="radio" name="product_rating" id="p3" value="3"><label for="p3">★</label>
                    <input type="radio" name="product_rating" id="p2" value="2"><label for="p2">★</label>
                    <input type="radio" name="product_rating" id="p1" value="1"><label for="p1">★</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Sales Person Rating</label>
                <div class="star-rating" id="sales-stars">
                    <input type="radio" name="sales_rating" id="s5" value="5"><label for="s5">★</label>
                    <input type="radio" name="sales_rating" id="s4" value="4"><label for="s4">★</label>
                    <input type="radio" name="sales_rating" id="s3" value="3"><label for="s3">★</label>
                    <input type="radio" name="sales_rating" id="s2" value="2"><label for="s2">★</label>
                    <input type="radio" name="sales_rating" id="s1" value="1"><label for="s1">★</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Comments</label>
                <textarea class="form-control" id="feedback-comment" rows="3"
                    placeholder="Tell us more about your experience..."></textarea>
            </div>

            <button type="submit" class="btn btn-submit">Submit Feedback</button>
        </form>
    </div>

    <div id="success-screen" class="success-overlay">
        <i class="bi bi-check-circle-fill success-icon"></i>
        <h2 class="fw-bold">Thank You!</h2>
        <p class="text-muted">Your feedback has been submitted successfully.</p>
        <button class="btn btn-primary mt-4 px-5 rounded-pill" onclick="location.reload()">Done</button>
    </div>

    <script>
        // Dummy Agent Data (Referral Codes Mapping)
        const agentMap = {
            'REF-RS-101': 'Rahul Sharma',
            'REF-PP-102': 'Priya Patel',
            'REF-AS-103': 'Amit Shah'
        };

        // Detect Agent from URL referral code
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || 'REF-RS-101';
        const agentName = agentMap[refCode] || 'Sales Executive';

        // Update UI with Agent Info
        document.getElementById('agent-name').textContent = agentName;
        const initials = agentName.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('agent-initials').textContent = initials;

        // Handle Form Submission
        document.getElementById('feedback-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Collect Data
            const formData = {
                client: document.getElementById('client-name').value,
                mobile: document.getElementById('client-mobile').value,
                shop: document.getElementById('shop-name').value,
                product: document.getElementById('feedback-product').value,
                p_rating: document.querySelector('input[name="product_rating"]:checked')?.value,
                s_rating: document.querySelector('input[name="sales_rating"]:checked')?.value,
                comment: document.getElementById('feedback-comment').value,
                agent: agentName,
                ref: refCode
            };

            console.log("Feedback Submitted:", formData);

            // Show Success Animation
            document.getElementById('success-screen').style.display = 'flex';
        });
    </script>
</body>

</html>
