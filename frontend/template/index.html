<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM AI SETU — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Gradient Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            animation: mesh-anim 20s ease infinite alternate;
        }

        @keyframes mesh-anim {
            0% {
                filter: hue-rotate(0deg);
            }

            100% {
                filter: hue-rotate(45deg);
            }
        }

        .login-card {
            max-width: 440px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: var(--radius-lg, 16px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            border-right: none;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            color: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            padding: 0.875rem;
            font-weight: 600;
            border-radius: 12px;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
    </style>
</head>

<body class="p-3">
    <div class="bg-mesh"></div>

    <div class="login-card shadow-lg">
        <div class="text-center mb-5">
            <div class="brand-icon">
                <i class="bi bi-diagram-3-fill text-white fs-2"></i>
            </div>
            <h1>CRM AI SETU</h1>
            <p class="text-muted small">Sign in to your professional workspace</p>
        </div>

        <div id="login-error" class="alert alert-danger d-none" role="alert"
            style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; border-radius: 12px; font-size: 0.85rem;">
        </div>

        <form id="login-form">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
            </div>
            <div class="mb-5">
                <label class="form-label">Password</label>
                <div class="input-group password-wrapper" style="position: relative; width: 100%;">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        style="border-radius: 0 10px 10px 0;">
                    <button type="button" class="password-toggle-btn" id="togglePassword"
                        onclick="togglePasswordVisibility('password', 'password-icon')">
                        <i id="password-icon" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary w-100 fw-bold">
                Sign In to Dashboard
            </button>
        </form>

        <p class="text-center text-muted small mt-5 mb-0" style="opacity: 0.5;">
            &copy; 2025 CRM AI SETU. All rights reserved.
        </p>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/ui_components.js"></script>

    <script src="../js/auth.js?v=2.3"></script>
    <script>
        // auth.js?v=2.3 now handles the global 'API' variable with caching.

        // Instead of blindly clearing tokens, auth.js?v=2.3 pageshow handles auto-redirecting
        // if the session is still valid. If it's invalid, it clears them.

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('login-error');
            errEl.classList.add('d-none');
            btn.innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Verifying Credentials...
            `;
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Invalid credentials');
                }

                const data = await res.json();
                localStorage.setItem('access_token', data.access_token);
                if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);

                // Fast Redirect (Sync profile on landing)
                window.location.replace('dashboard.html');

                // Background Sync (best-effort before page change)
                fetch(`${API}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${data.access_token}` }
                }).then(r => r.json()).then(p => {
                    localStorage.setItem('crm_user', JSON.stringify({
                        id: p.id, name: p.name || p.email, role: p.role
                    }));
                }).catch(() => { });
            } catch (err) {
                errEl.textContent = err.message || 'Login failed. Please try again.';
                errEl.classList.remove('d-none');
            } finally {
                btn.innerHTML = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
