    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js?v=2.6"></script>

    <script src="../js/auth.js?v=2.6"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('employees');
        injectTopHeader('Employees');

        const currentUser = getUser();
        const isAdmin = currentUser?.role === 'ADMIN';
        let employeesData = [];

        // Modals
        function openEditModal(id) {
            const emp = employeesData.find(e => e.id === id);
            if (!emp) return;

            document.getElementById('edit-id').value = emp.id;
            document.getElementById('edit-name').value = emp.name || '';
            document.getElementById('edit-email').value = emp.email || '';
            document.getElementById('edit-phone').value = emp.phone || '';
            document.getElementById('edit-department').value = emp.department || '';
            document.getElementById('edit-role').value = emp.role || 'TELESALES';
            document.getElementById('edit-emp-code').value = emp.employee_code || '';
            document.getElementById('edit-salary').value = emp.base_salary || 0;
            document.getElementById('edit-target').value = emp.target || 0;
            document.getElementById('edit-status').value = emp.is_active ? 'true' : 'false';
            document.getElementById('edit-password').value = ''; // Always empty

            document.getElementById('editEmployeeModal').classList.add('show');
        }
        function closeEditModal() { document.getElementById('editEmployeeModal').classList.remove('show'); }

        ['editEmployeeModal'].forEach(id => {
            document.getElementById(id).addEventListener('click', function (e) {
                if (e.target === this) this.classList.remove('show');
            });
        });

        async function loadEmployees() {
            const tbody = document.getElementById('employees-tbody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Loading employees...</td></tr>';
            try {
                // Fetch using universal API endpoint
                employeesData = await ApiClient.getEmployees();
                document.getElementById('employee-count-badge').innerText = `${employeesData.length} Employee${employeesData.length !== 1 ? 's' : ''}`;

                if (employeesData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No employees found.</td></tr>';
                    return;
                }

                tbody.innerHTML = employeesData.map(emp => {
                    const avatarLetter = (emp.name || emp.email || 'U')[0].toUpperCase();
                    const statusClass = emp.is_active ? 'status-active' : 'status-inactive';
                    const statusText = emp.is_active ? '<i class="bi bi-check-circle-fill"></i> Active' : '<i class="bi bi-x-circle-fill"></i> Inactive';
                    const roleClass = (emp.role || 'CLIENT').toUpperCase();

                    let actions = `<span class="text-muted small">Not Admin</span>`;
                    if (isAdmin) {
                        actions = `
                            <button class="btn btn-sm btn-light border-secondary text-secondary me-1" onclick="openEditModal(${emp.id})" title="Edit"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-light border-danger text-danger" onclick="deleteEmployee(${emp.id})" title="Delete"><i class="bi bi-trash"></i></button>
                        `;
                    }

                    return `
                    <tr>
                        <td class="px-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="employee-avatar shadow-sm">${avatarLetter}</div>
                                <div>
                                    <h6 class="mb-0 fw-bold text-dark">${emp.name || '<i>No Name</i>'}</h6>
                                    <small class="text-muted">${emp.email}</small>
                                </div>
                            </div>
                        </td>
                        <td class="px-4">
                            <div class="fw-semibold text-dark">${emp.department || '—'}</div>
                            <small class="text-muted">${emp.employee_code || 'No Code'}</small>
                        </td>
                        <td class="px-4">
                            <span class="role-badge role-${roleClass}">${(emp.role || 'Unknown').replace(/_/g, ' ')}</span>
                        </td>
                        <td class="px-4 text-muted">
                            ${emp.phone ? `<i class="bi bi-telephone me-1"></i>${emp.phone}` : '—'}
                        </td>
                        <td class="px-4">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td class="px-4 text-end">
                            ${actions}
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error("Error loading employees", err);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Failed to load employees (${err.message || 'Unknown error'})</td></tr>`;
            }
        }

        async function submitEditEmployee() {
            const id = document.getElementById('edit-id').value;
            const btn = document.getElementById('edit-submit-btn');
            const data = {
                name: document.getElementById('edit-name').value || null,
                phone: document.getElementById('edit-phone').value || null,
                department: document.getElementById('edit-department').value || null,
                role: document.getElementById('edit-role').value,
                employee_code: document.getElementById('edit-emp-code').value || null,
                base_salary: parseFloat(document.getElementById('edit-salary').value) || null,
                target: parseInt(document.getElementById('edit-target').value) || null,
                is_active: document.getElementById('edit-status').value === 'true'
            };

            const pw = document.getElementById('edit-password').value;
            if (pw) data.password = pw;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
                await ApiClient.updateEmployee(id, data);
                showToast('Employee updated successfully', 'success');
                closeEditModal();
                loadEmployees();
            } catch (err) {
                console.error("Edit failed", err);
                showToast(err.data?.detail || err.message || 'Failed to update employee', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save Changes';
            }
        }

        async function deleteEmployee(id) {
            if (!confirm('Are you sure you want to delete this employee? This action usually cannot be undone.')) return;
            try {
                await ApiClient.deleteEmployee(id);
                showToast('Employee deleted successfully', 'success');
                loadEmployees();
            } catch (err) {
                console.error("Delete failed", err);
                showToast(err.data?.detail || err.message || 'Failed to delete employee', 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadEmployees();
        });

    </script>
</body>
