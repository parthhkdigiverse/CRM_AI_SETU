<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visits — CRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <!-- The top header is automatically injected here by js/auth.js?v=2.3 -->
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h2 class="fw-bold fs-3 mb-1">Visits</h2>
                    <small class="text-muted">Track field visit schedules and outcomes.</small>
                </div>
                <div class="d-flex gap-2">
                    <button id="add-visit-btn" class="btn btn-primary shadow-sm" data-bs-toggle="modal"
                        data-bs-target="#logVisitModal"
                        style="background-color: #6366f1; border-color: #6366f1; border-radius: 8px; font-weight: 500;">
                        <i class="bi bi-plus-lg me-1"></i> Log Shop Visit
                    </button>
                </div>
            </div>

            <!-- Summary Tiles -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4" style="border: 1px solid #f1f5f9 !important;">
                        <div class="card-body p-4 d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted fw-bold mb-2" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                                    TODAY'S VISITS</p>
                                <h3 class="fw-bold fs-2 mb-0 text-dark" id="stat-today">0</h3>
                            </div>
                            <div class="rounded-circle d-flex justify-content-center align-items-center"
                                style="width: 48px; height: 48px; background-color: #f3f0ff; color: #8b5cf6;">
                                <i class="bi bi-calendar-event fs-5"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4" style="border: 1px solid #f1f5f9 !important;">
                        <div class="card-body p-4 d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted fw-bold mb-2" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                                    COMPLETED THIS WEEK</p>
                                <h3 class="fw-bold fs-2 mb-0 text-dark" id="stat-week">0</h3>
                            </div>
                            <div class="rounded-circle d-flex justify-content-center align-items-center"
                                style="width: 48px; height: 48px; background-color: #ecfdf5; color: #10b981;">
                                <i class="bi bi-clock-history fs-5"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4" style="border: 1px solid #f1f5f9 !important;">
                        <div class="card-body p-4 d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted fw-bold mb-2" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                                    MISSED VISITS</p>
                                <h3 class="fw-bold fs-2 mb-0 text-dark" id="stat-missed">0</h3>
                            </div>
                            <div class="rounded-circle d-flex justify-content-center align-items-center"
                                style="width: 48px; height: 48px; background-color: #fef2f2; color: #ef4444;">
                                <i class="bi bi-geo-alt fs-5"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr class="text-muted"
                                style="font-size: 0.75rem; letter-spacing: 0.5px; border-bottom: 2px solid #f1f5f9;">
                                <th class="fw-semibold border-0 py-3 px-4">SHOP</th>
                                <th class="fw-semibold border-0 py-3">AREA</th>
                                <th class="fw-semibold border-0 py-3">AGENT</th>
                                <th class="fw-semibold border-0 py-3">DATE</th>
                                <th class="fw-semibold border-0 py-3">TIME</th>
                                <th class="fw-semibold border-0 py-3">STATUS</th>
                                <th class="fw-semibold border-0 py-3">NOTES</th>
                            </tr>
                        </thead>
                        <tbody id="visits-table">
                            <tr>
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-arrow-clockwise spinner-border spinner-border-sm"></i>
                                    <p class="mt-2">Loading leads...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Visit Modal -->
    <div class="modal fade" id="logVisitModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-geo-alt me-2"></i>Update Shop Status</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Target Shop *</label>
                        <select id="v-shop" class="form-select" required>
                            <option value="">Loading shops...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Interaction Outcome</label>
                        <select id="v-status" class="form-select">
                            <option value="SATISFIED">Satisfied</option>
                            <option value="ACCEPT">Accept (Gen. Bill)</option>
                            <option value="DECLINE">Decline</option>
                            <option value="THINKING">Taking time to think</option>
                            <option value="OTHER">Other</option>
                            <option value="SCHEDULED">Scheduled/Pending</option>
                        </select>
                    </div>
                    <div class="mb-3" id="other-status-div" style="display:none;">
                        <label class="form-label">Specify Other Status</label>
                        <input type="text" id="v-status-other" class="form-control" placeholder="Describe status...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Remarks / Reason</label>
                        <textarea id="v-remarks" class="form-control" rows="3"
                            placeholder="Detailed outcome or reason if declined..."></textarea>
                    </div>
                    <div class="mb-3" id="photo-upload-container">
                        <label class="form-label fw-semibold">Photo of Visited Shop</label>
                        <input type="file" id="v-photo" class="form-control" accept="image/*">
                        <small class="text-muted">Required for Sales role, not for Telesales.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="save-visit-btn">Save Progress</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/ui_components.js"></script>
    <script src="../js/auth.js?v=2.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('visits');

        const user = getUser();
        const isSales = user?.role === 'SALES' || user?.role === 'PROJECT_MANAGER_AND_SALES';
        const isTelesales = user?.role === 'TELESALES';
        const isPM = user?.role === 'PROJECT_MANAGER';
        const isAdmin = user?.role === 'ADMIN';

        // Role-based button adjustments
        const addBtn = document.getElementById('add-visit-btn');
        if (addBtn) {
            if (isPM && !isSales) {
                // Pure Project Managers only have read_access according to backend
                addBtn.style.display = 'none';
            } else if (isTelesales) {
                addBtn.innerHTML = '<i class="bi bi-plus-lg me-1"></i> Log Call Outcome';
            } else if (isAdmin) {
                addBtn.innerHTML = '<i class="bi bi-plus-lg me-1"></i> Add Visit Record';
            } else {
                addBtn.innerHTML = '<i class="bi bi-plus-lg me-1"></i> Add Visited Shop';
            }
        }

        // Hide photo upload for Telesales
        if (isTelesales) {
            document.getElementById('photo-upload-container').style.display = 'none';
        }

        // Handle "Other" status specification
        document.getElementById('v-status').addEventListener('change', (e) => {
            document.getElementById('other-status-div').style.display = e.target.value === 'OTHER' ? 'block' : 'none';
        });

        // Load shops into dropdown
        apiGet('/shops/').then(shops => {
            const sel = document.getElementById('v-shop');
            sel.innerHTML = '<option value="">-- Select Shop to Update --</option>' +
                shops.map(s => `<option value="${s.id}">${s.name} (${s.address || 'No Address'})</option>`).join('');
        }).catch(() => { });

        async function loadVisits() {
            try {
                const visits = await apiGet('/visits/?limit=200');
                // Calculate Stats
                const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
                let todayCount = 0;
                let completedWeekCount = 0; // Simple approximation for demo purposes
                let missedCount = 0;

                visits.forEach(v => {
                    const vDateStr = v.visit_date ? new Date(v.visit_date).toLocaleDateString('en-CA') : '';
                    if (vDateStr === todayStr) todayCount++;
                    if (v.status === 'SATISFIED' || v.status === 'ACCEPT') completedWeekCount++;
                    if (v.status === 'DECLINE') missedCount++;
                });

                document.getElementById('stat-today').textContent = todayCount;
                document.getElementById('stat-week').textContent = completedWeekCount;
                document.getElementById('stat-missed').textContent = missedCount;

                const statusUI = s => {
                    if (s === 'SATISFIED' || s === 'ACCEPT') return { bg: '#dcfce7', text: '#166534', label: 'Completed' };
                    if (s === 'DECLINE') return { bg: '#fee2e2', text: '#991b1b', label: 'Missed' };
                    return { bg: '#ede9fe', text: '#5b21b6', label: 'Scheduled' }; // THINKING, SCHEDULED, OTHER
                };

                document.getElementById('visits-table').innerHTML = visits.length
                    ? visits.map(v => {
                        const ui = statusUI(v.status);
                        const vDate = v.visit_date ? new Date(v.visit_date) : null;
                        const dateStr = vDate ? vDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
                        const timeStr = vDate ? vDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : '—';

                        return `
                        <tr style="border-bottom: 1px solid #f8fafc; cursor: pointer;" onclick="if(window.editVisit) editVisit(${v.id})">
                        <td class="fw-semibold text-dark px-4 py-3" style="font-size: 0.9rem;">
                            ${v.shop_name || 'Shop #' + v.shop_id}
                        </td>
                        <td class="text-muted py-3" style="font-size: 0.9rem;">
                            ${v.area_name || '—'}
                        </td>
                        <td class="py-3">
                            <div class="d-flex align-items-center gap-2 text-muted" style="font-size: 0.9rem;">
                                <i class="bi bi-person text-secondary"></i>
                                <span>${v.user_name || '—'}</span>
                            </div>
                        </td>
                        <td class="text-muted py-3" style="font-size: 0.9rem;">${dateStr}</td>
                        <td class="text-muted py-3" style="font-size: 0.9rem;">${timeStr}</td>
                        <td class="py-3">
                            <span class="badge rounded-pill fw-semibold" style="background-color: ${ui.bg}; color: ${ui.text}; font-size: 0.75rem; letter-spacing: 0.3px; padding: 0.4em 0.8em;">
                                ${ui.label}
                            </span>
                        </td>
                        <td class="text-muted py-3 text-truncate" style="max-width:200px; font-size: 0.9rem;" title="${v.remarks || ''}">
                            ${v.remarks || '—'}
                        </td>
                    </tr>`}).join('')
                    : '<tr><td colspan="7" class="text-center py-5 text-muted">No activities recorded yet.</td></tr>';
            } catch (err) {
                document.getElementById('visits-table').innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger">Failed to load data: ${err.message}</td></tr>`;
            }
        }

        document.getElementById('save-visit-btn').addEventListener('click', async () => {
            const shopId = document.getElementById('v-shop').value;
            if (!shopId) return showToast('Please select a shop', 'error');

            const status = document.getElementById('v-status').value;
            const photo = document.getElementById('v-photo').files[0];

            if (isSales && !photo && status !== 'SCHEDULED') {
                showToast('Photo is required for Field Sales roles', 'error');
                btn.disabled = false; btn.textContent = 'Save Progress';
                return;
            }

            const btn = document.getElementById('save-visit-btn');
            btn.disabled = true; btn.textContent = 'Processing...';

            const fd = new FormData();
            fd.append('shop_id', shopId);
            fd.append('status', status === 'OTHER' ? document.getElementById('v-status-other').value.toUpperCase() : status);
            fd.append('remarks', document.getElementById('v-remarks').value);

            // Auto date
            fd.append('visit_date', new Date().toISOString());

            if (photo) fd.append('photo', photo);

            try {
                // Use standard apiFetch since we're dealing with FormData
                const res = await apiFetch('/visits/', {
                    method: 'POST',
                    body: fd,
                    // Note: Don't set Content-Type header when sending FormData, 
                    // the browser sets it automatically with the correct boundary
                    headers: {}
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Failed to create visit');
                }

                if (status === 'ACCEPT') {
                    showToast('Lead Accepted! Converting to client flow...', 'success');
                    setTimeout(() => window.location.href = 'clients.html', 1500);
                } else {
                    bootstrap.Modal.getInstance(document.getElementById('logVisitModal')).hide();
                    showToast('Status updated successfully!');
                    loadVisits();
                }
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Save Progress';
            }
        });

        loadVisits();
    </script>

</body>

</html>
