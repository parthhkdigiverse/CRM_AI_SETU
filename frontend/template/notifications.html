<!DOCTYPE html>
<!-- frontend/template/notifications.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications | SRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=20260321">
    <link rel="stylesheet" href="../css/components.css?v=20260321">
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1 main-wrapper">
            <div class="page-content-standard">
                <div class="page-header-glass d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="mb-3 mb-sm-0">
                        <h2 class="page-section-title fw-bold mb-1">Notifications</h2>
                        <p class="text-muted mb-0" style="font-size:0.93rem;">A timeline of recent system alerts and critical updates.</p>
                    </div>
                        <div class="d-flex align-items-center gap-3">
                            <button class="btn btn-outline-secondary btn-sm fw-semibold" style="border-radius:10px;" onclick="clearAlerts()">
                                <i class="bi bi-check2-all me-1"></i> Mark All as Read
                            </button>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0" style="border-radius: 12px; width: 100%; max-width: none;">
                        <div class="card-body p-0">
                            <!-- Feed -->
                            <div id="notif-list">
                                <!-- Dynamically loaded -->
                                <div class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div><!-- /page-content -->
        </div>
    </div>

    <script src="../js/utils.js?v=20260321"></script>
    <script src="../js/api.js?v=20260321"></script>
    <script src="../js/auth.js?v=20260321"></script>
    <script src="../js/ui_components.js?v=20260321"></script>
    <script src="../js/app.js?v=20260321"></script>
    <script src="../js/notifications.js?v=2.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        const sb = document.getElementById('sidebar');
        if (sb) sb.innerHTML = renderSidebar('notifications');
        injectTopHeader('Notifications');
    </script>
</body>

</html>
