<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaves — SRM AI SETU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
</head>

<body>
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                    <div>
                        <h2 class="page-section-title">Leave Management</h2>
                        <p class="text-muted mb-0" style="font-size:0.93rem;">Manage leave applications, track status,
                            and approve/reject requests.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary fw-semibold" style="border-radius:10px;"
                            onclick="openLeaveModal()">
                            <i class="bi bi-calendar-plus me-2"></i>Apply Leave
                        </button>
                    </div>
                </div>

                <!-- Leaves Table -->
                <div class="grid-card">
                    <div class="d-flex justify-content-between align-items-center p-4 border-bottom">
                        <h6 class="fw-bold mb-0" style="color:#334155;">Leave Applications</h6>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>From Date</th>
                                    <th>To Date</th>
                                    <th>Days</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="leaves-tbody">
                                <tr>
                                    <td colspan="7" class="text-center py-5 text-muted"><span
                                            class="spinner-border spinner-border-sm me-2"></span>Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div><!-- /page-content -->
        </div>
    </div>

    <!-- ─── Apply Leave Modal ─────────────────────────────────── -->
    <div class="crm-overlay" id="leaveModal">
        <div class="crm-box">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                <h5 class="fw-bold mb-0"><i class="bi bi-calendar-minus text-primary me-2"></i>Apply for Leave</h5>
                <button class="btn-close" onclick="closeLeaveModal()"></button>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label fw-semibold small">From Date <span class="text-danger">*</span></label>
                    <input type="date" id="l-start" class="form-control">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold small">To Date <span class="text-danger">*</span></label>
                    <input type="date" id="l-end" class="form-control">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Reason / Note</label>
                <textarea id="l-reason" class="form-control" rows="3"
                    placeholder="e.g. Family function, medical appointment..."></textarea>
            </div>
            <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                <button class="btn btn-light border" onclick="closeLeaveModal()">Cancel</button>
                <button class="btn btn-primary px-4 fw-semibold" id="leave-submit-btn" onclick="submitLeave()">Submit
                    Request</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js?v=2.6"></script>
    <script src="../js/ui_components.js?v=2.6"></script>
    <script src="../js/auth.js?v=2.6"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('leaves');
        injectTopHeader('Leaves');

        const user = getUser();
        const isAdmin = user?.role === 'ADMIN';

        // ── Modal controls ────────────────────────────────────────
        function openLeaveModal() { document.getElementById('leaveModal').classList.add('show'); }
        function closeLeaveModal() { document.getElementById('leaveModal').classList.remove('show'); }
        document.getElementById('leaveModal').addEventListener('click', function (e) { if (e.target === this) this.classList.remove('show'); });

        // ── Leave Status Styling ──────────────────────────────────
        const leaveStatusMap = {
            PENDING: { bg: '#fef3c7', color: '#d97706', label: 'Pending', icon: 'bi-hourglass-split' },
            APPROVED: { bg: '#dcfce7', color: '#16a34a', label: 'Approved', icon: 'bi-check-circle' },
            REJECTED: { bg: '#fee2e2', color: '#dc2626', label: 'Rejected', icon: 'bi-x-circle' },
        };

        // ── Load Leaves ───────────────────────────────────────────
        async function loadLeaves() {
            const tbody = document.getElementById('leaves-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Loading...</td></tr>';
            try {
                const endpoint = isAdmin ? '/hrm/leave/all' : '/hrm/leave';
                const leaves = await ApiClient.request(endpoint);

                if (!leaves.length) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="bi bi-calendar-x" style="font-size:2rem;display:block;margin-bottom:8px;color:#cbd5e1;"></i>No leave requests found.</td></tr>';
                    return;
                }
                tbody.innerHTML = leaves.map(l => {
                    const st = leaveStatusMap[l.status] || leaveStatusMap.PENDING;
                    const start = new Date(l.start_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    const end = new Date(l.end_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    const days = Math.ceil((new Date(l.end_date) - new Date(l.start_date)) / 86400000) + 1;
                    const actionBtns = isAdmin && l.status === 'PENDING'
                        ? `<div class="d-flex gap-1 justify-content-end">
                          <button class="btn btn-sm btn-outline-success" title="Approve" onclick="approveLeave(${l.id}, 'APPROVED')"><i class="bi bi-check"></i></button>
                          <button class="btn btn-sm btn-outline-danger" title="Reject" onclick="approveLeave(${l.id}, 'REJECTED')"><i class="bi bi-x"></i></button>
                       </div>`
                        : `<span class="text-muted small">${l.approver_name || '—'}</span>`;
                    return `<tr>
                    <td class="fw-semibold text-dark">${l.user_name || 'User #' + l.user_id}</td>
                    <td class="text-muted">${start}</td>
                    <td class="text-muted">${end}</td>
                    <td class="fw-semibold">${days}</td>
                    <td class="text-muted text-truncate" style="max-width:200px;" title="${l.reason || ''}">${l.reason || '—'}</td>
                    <td><span class="status-pill" style="background:${st.bg}; color:${st.color};"><i class="bi ${st.icon} me-1"></i>${st.label}</span></td>
                    <td class="text-end">${actionBtns}</td>
                </tr>`;
                }).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${e.message || 'Err'}</td></tr>`;
            }
        }

        // ── Submit Leave ──────────────────────────────────────────
        async function submitLeave() {
            const start = document.getElementById('l-start').value;
            const end = document.getElementById('l-end').value;
            const btn = document.getElementById('leave-submit-btn');
            if (!start || !end) { showToast('Please select start and end dates', 'error'); return; }
            if (new Date(end) < new Date(start)) { showToast('End date must be after start date', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';
            try {
                await ApiClient.request('/hrm/leave', {
                    method: 'POST',
                    body: { start_date: start, end_date: end, reason: document.getElementById('l-reason').value }
                });
                closeLeaveModal();
                showToast('Leave request submitted!', 'success');
                loadLeaves();
            } catch (e) { showToast(e.data?.detail || e.message || 'Failed to apply leave', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'Submit Request'; }
        }

        // ── Approve/Reject Leave ──────────────────────────────────
        async function approveLeave(id, status) {
            const label = status === 'APPROVED' ? 'Approve' : 'Reject';
            if (!confirm(`${label} this leave request?`)) return;
            try {
                await ApiClient.request(`/hrm/leave/${id}/approve`, { method: 'PATCH', body: { status } });
                showToast(`Leave ${status.toLowerCase()}!`, 'success');
                loadLeaves();
            } catch (e) { showToast(e.data?.detail || e.message || 'Action failed', 'error'); }
        }

        loadLeaves();
    </script>
</body>

</html>
