<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salary — SRM AI SETU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780187">
    <link rel="stylesheet" href="../css/components.css?v=1772780187">
</head>

<body>
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                    <div>
                        <h2 class="page-section-title">Salary Management</h2>
                        <p class="text-muted mb-0" style="font-size:0.93rem;">Generate and manage employee salary slips
                            and payroll history.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary fw-semibold" style="border-radius:10px;" id="gen-salary-btn"
                            onclick="openSalaryModal()">
                            <i class="bi bi-file-earmark-text me-2"></i>Generate Slip
                        </button>
                    </div>
                </div>

                <!-- Salary Slips Table -->
                <div id="tab-slips" class="grid-card">
                    <div class="d-flex justify-content-between align-items-center p-4 border-bottom">
                        <h6 class="fw-bold mb-0" style="color:#334155;">Generated Salary Slips</h6>
                        <div class="d-flex gap-2">
                            <select id="slip-user-filter" class="form-select form-select-sm" style="width:auto;"
                                onchange="loadSlips()">
                                <option value="">All Employees</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Month</th>
                                    <th>Base Salary</th>
                                    <th>Deductions</th>
                                    <th>Net Salary (₹)</th>
                                    <th>Paid / Unpaid Leaves</th>
                                </tr>
                            </thead>
                            <tbody id="slips-tbody">
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">Select an employee to view
                                        history</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div><!-- /page-content -->
        </div>
    </div>

    <!-- ─── Generate Salary Slip Modal ───────────────────────── -->
    <div class="crm-overlay" id="salaryModal">
        <div class="crm-box">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                <h5 class="fw-bold mb-0"><i class="bi bi-file-earmark-text text-success me-2"></i>Generate Salary Slip
                </h5>
                <button class="btn-close" onclick="closeSalaryModal()"></button>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-12">
                    <label class="form-label fw-semibold small">Employee <span class="text-danger">*</span></label>
                    <select id="s-user" class="form-select">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small">Month (YYYY-MM) <span
                            class="text-danger">*</span></label>
                    <input type="month" id="s-month" class="form-control">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold small">Paid Leaves</label>
                    <input type="number" id="s-paid-leaves" class="form-control" value="0" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold small">Unpaid Leaves</label>
                    <input type="number" id="s-unpaid-leaves" class="form-control" value="0" min="0">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small">Extra Deductions (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" id="s-deduction" class="form-control" value="0" min="0" step="0.01">
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                <button class="btn btn-light border" onclick="closeSalaryModal()">Cancel</button>
                <button class="btn btn-success px-4 fw-semibold" id="salary-gen-btn"
                    onclick="generateSalarySlip()">Generate Slip</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js?v=2.6"></script>
    <script src="../js/ui_components.js?v=2.6"></script>
    <script src="../js/auth.js?v=2.6"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('salary');
        injectTopHeader('Salary');

        const user = getUser();
        const isAdmin = user?.role === 'ADMIN';

        // Non-admins can't generate salary slips
        if (!isAdmin) document.getElementById('gen-salary-btn').style.display = 'none';

        // ── Modal controls ────────────────────────────────────────
        function openSalaryModal() { document.getElementById('salaryModal').classList.add('show'); }
        function closeSalaryModal() { document.getElementById('salaryModal').classList.remove('show'); }
        document.getElementById('salaryModal').addEventListener('click', function (e) { if (e.target === this) this.classList.remove('show'); });

        // ── Load Employees for dropdowns ──────────────────────────
        ApiClient.getEmployees().then(emps => {
            const opts = '<option value="">— Select Employee —</option>' + emps.map(e => `<option value="${e.id}">${e.name || e.email}</option>`).join('');
            document.getElementById('s-user').innerHTML = opts;
            document.getElementById('slip-user-filter').innerHTML = '<option value="">All Employees</option>' + emps.map(e => `<option value="${e.id}">${e.name || e.email}</option>`).join('');
        }).catch(() => { });

        // ── Load Salary Slips ─────────────────────────────────────
        async function loadSlips() {
            const userId = document.getElementById('slip-user-filter').value;
            const tbody = document.getElementById('slips-tbody');

            // If not admin, we use /hrm/salary/me and ignore the filter
            const endpoint = isAdmin
                ? (userId ? `/hrm/salary/${userId}` : null)
                : '/hrm/salary/me';

            if (isAdmin && !userId) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">Select an employee to view slips.</td></tr>';
                return;
            }

            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Loading...</td></tr>';
            try {
                const slips = await ApiClient.request(endpoint);
                if (!slips.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No salary slips found.</td></tr>'; return; }
                tbody.innerHTML = slips.map(s => `<tr>
                <td class="fw-semibold text-dark">${s.user_name || 'User #' + s.user_id}</td>
                <td class="text-muted">${s.month}</td>
                <td>₹${Number(s.base_salary).toLocaleString('en-IN')}</td>
                <td class="text-danger">-₹${Number(s.deduction_amount).toLocaleString('en-IN')}</td>
                <td class="fw-bold text-dark fs-6">₹${Number(s.final_salary).toLocaleString('en-IN')}</td>
                <td class="text-muted">${s.paid_leaves} paid / ${s.unpaid_leaves} unpaid</td>
            </tr>`).join('');
            } catch (e) { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-danger">${e.message || 'Err'}</td></tr>`; }
        }

        // ── Generate Salary Slip ──────────────────────────────────
        async function generateSalarySlip() {
            const userId = document.getElementById('s-user').value;
            const month = document.getElementById('s-month').value;
            const btn = document.getElementById('salary-gen-btn');
            if (!userId || !month) { showToast('Select an employee and month', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating...';
            try {
                await ApiClient.generateSalary({
                    user_id: parseInt(userId),
                    month,
                    paid_leaves: parseInt(document.getElementById('s-paid-leaves').value) || 0,
                    unpaid_leaves: parseInt(document.getElementById('s-unpaid-leaves').value) || 0,
                    deduction_amount: parseFloat(document.getElementById('s-deduction').value) || 0
                });
                closeSalaryModal();
                showToast('Salary slip generated!', 'success');
                document.getElementById('slip-user-filter').value = userId;
                loadSlips();
            } catch (e) { showToast(e.data?.detail || e.message || 'Failed', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'Generate Slip'; }
        }

        if (!isAdmin) {
            document.getElementById('slip-user-filter').style.display = 'none';
            loadSlips();
        }
    </script>
</body>

</html>
</script>
</body>

</html>
