<!DOCTYPE html>
<!-- frontend/template/projects.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Active Projects — CRM AI SETU</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/theme.css?v=1772780188">
    <link rel="stylesheet" href="../css/components.css?v=1772780188">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
        }

        .page-header-banner {
            background: linear-gradient(135deg, #059669 0%, #10b981 60%, #34d399 100%);
            border-radius: 18px;
            padding: 2rem 2.5rem;
            color: white;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(5, 150, 105, 0.25);
        }

        .page-header-banner::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -40px;
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .page-header-banner::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: 30%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .projects-table-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9;
            overflow: hidden;
        }

        .empty-state {
            padding: 5rem 2rem;
            text-align: center;
            color: #94a3b8;
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .proj-type-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            background: #e0e7ff;
            color: #4338ca;
        }
    </style>
</head>

<body class="bg-app">
    <div class="d-flex" style="height:100vh;overflow:hidden;">
        <div id="sidebar"></div>
        <div class="flex-grow-1" style="overflow-y:auto;min-width:0;">
            <div class="page-content">

                <!-- Page Header -->
                <div class="page-header-banner">
                    <div style="position:relative;z-index:1;">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge"
                                style="background:rgba(255,255,255,0.2);font-size:0.75rem;padding:5px 12px;border-radius:20px;">
                                <i class="bi bi-briefcase-fill me-1"></i>Active Projects
                            </span>
                        </div>
                        <h1 class="fw-bold mb-1" style="font-size:1.8rem;">Active Projects Dashboard</h1>
                        <p class="mb-0 opacity-75" style="font-size:0.95rem;">Shops that have been converted through the
                            billing pipeline · Deals successfully closed</p>
                        <div class="d-flex gap-3 mt-3 flex-wrap">
                            <span class="stat-pill"><i class="bi bi-check-circle-fill"></i> <span
                                    id="total-count">—</span> Projects</span>
                            <span class="stat-pill"><i class="bi bi-person-badge-fill"></i> <span id="dashboard-pm-name">PM Assigned</span></span>
                        </div>
                    </div>
                    <div style="position:absolute;top:1.5rem;right:2rem;z-index:1;">
                        <button class="btn btn-light btn-sm fw-semibold rounded-pill px-3" onclick="loadProjects()">
                            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                        </button>
                    </div>
                </div>

                <!-- Stats Row -->
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-content-left">
                                <div class="stat-label">Total Projects</div>
                                <div class="stat-value" id="stat-total">—</div>
                            </div>
                            <div class="stat-icon-wrapper icon-green"><i class="bi bi-briefcase"></i></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-content-left">
                                <div class="stat-label">With PM Assigned</div>
                                <div class="stat-value" id="stat-pm">—</div>
                            </div>
                            <div class="stat-icon-wrapper icon-purple"><i class="bi bi-person-badge"></i></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-content-left">
                                <div class="stat-label">With Contact Info</div>
                                <div class="stat-value" id="stat-contact">—</div>
                            </div>
                            <div class="stat-icon-wrapper icon-yellow"><i class="bi bi-telephone"></i></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card">
                            <div class="stat-content-left">
                                <div class="stat-label">AI Integration</div>
                                <div class="stat-value" id="stat-ai">—</div>
                            </div>
                            <div class="stat-icon-wrapper" style="background:#ede9fe;"><i class="bi bi-cpu"
                                    style="color:#7c3aed;"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Projects Table -->
                <div class="projects-table-card">
                    <div class="p-3 border-bottom d-flex align-items-center justify-content-between"
                        style="background:#fafbfc;">
                        <span class="fw-bold text-dark" style="font-size:0.95rem;">
                            <i class="bi bi-table me-2 text-success"></i>Converted Projects
                        </span>
                        <span class="badge bg-success-subtle text-success rounded-pill" id="queue-count-badge">0
                            projects</span>
                    </div>
                    <!-- Search bar -->
                    <div class="p-3 border-bottom" style="background:#fafbfc;">
                        <div class="position-relative" style="max-width:300px;">
                            <i class="bi bi-search position-absolute"
                                style="left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;"></i>
                            <input type="text" id="project-search" placeholder="Search by name, contact or PM…"
                                class="form-control form-control-sm"
                                style="padding-left:32px;border-radius:8px;font-size:0.85rem;" oninput="applySearch()">
                        </div>
                    </div>
                    <div id="projects-table-wrapper">
                        <div class="empty-state">
                            <i class="bi bi-hourglass fs-1 d-block mb-2 opacity-25"></i>
                            <div class="fw-semibold">Loading active projects...</div>
                        </div>
                    </div>
                </div>

            </div><!-- /page-content -->
        </div>
    </div>

    <script src="../js/api.js?v=2.4"></script>
    <script src="../js/ui_components.js?v=1772780187"></script>
    <script src="../js/auth.js?v=1772780187"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        const sidebarElement = document.getElementById('sidebar');
        if (sidebarElement) sidebarElement.innerHTML = renderSidebar('projects');
        injectTopHeader('Active Projects');

        let allProjects = [];

        // ── Render the projects table ──
        function renderProjectsTable(projects) {
            const wrapper = document.getElementById('projects-table-wrapper');
            const badge = document.getElementById('queue-count-badge');
            badge.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;

            if (!projects || projects.length === 0) {
                wrapper.innerHTML = `<div class="empty-state">
                    <i class="bi bi-briefcase fs-1 d-block mb-2 opacity-25"></i>
                    <div class="fw-semibold">No active projects yet</div>
                    <div class="small mt-1 text-muted">Projects appear here once a deal is closed via the Billing pipeline.</div>
                </div>`;
                return;
            }

            let html = `<div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="font-size:0.88rem;">
                    <thead style="background:#f8fafc;border-bottom:2px solid #f1f5f9;">
                        <tr>
                            <th class="px-4 py-3 text-uppercase text-muted" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Project / Shop</th>
                            <th class="px-3 py-3 text-uppercase text-muted" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Client Contact</th>
                            <th class="px-3 py-3 text-uppercase text-muted" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Assigned PM</th>
                            <th class="px-3 py-3 text-uppercase text-muted" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Project Type</th>
                            <th class="px-3 py-3 text-uppercase text-muted text-center" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Status</th>
                            <th class="px-4 py-3 text-uppercase text-muted text-end" style="font-size:0.7rem;letter-spacing:0.05em;font-weight:700;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>`;

            projects.forEach(project => {
                const projectType = project.project_type || null;
                const pmName = project.pm_name || null;

                // User Request: Update dashboard PM label 
                const dashPmName = document.getElementById('dashboard-pm-name');
                if (dashPmName && pmName) {
                    dashPmName.innerText = pmName;
                }

                html += `<tr id="proj-row-${project.id}">
                    <td class="px-4 py-3">
                        <div class="fw-bold text-dark">${project.name || '—'}</div>
                        <div class="small text-muted">${project.area_name || ''}</div>
                    </td>
                    <td class="px-3 py-3">
                        <div class="fw-semibold">${project.contact_person || '—'}</div>
                        <div class="small text-muted"><i class="bi bi-telephone me-1"></i>${project.phone || '—'}</div>
                        ${project.email ? `<div class="small text-muted"><i class="bi bi-envelope me-1"></i>${project.email}</div>` : ''}
                    </td>
                    <td class="px-3 py-3">
                        ${pmName
                        ? `<div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 text-white"
                                    style="width:28px;height:28px;background:#6d28d9;font-size:0.68rem;font-weight:700;">
                                    ${pmName.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase()}
                                </div>
                                <div class="fw-semibold" style="font-size:0.82rem;">${pmName}</div>
                               </div>`
                        : `<span class="small text-muted fst-italic">Not assigned</span>`}
                    </td>
                    <td class="px-3 py-3">
                        ${projectType
                        ? `<span class="proj-type-badge">${projectType}</span>`
                        : `<span class="small text-muted">—</span>`}
                    </td>
                    <td class="px-3 py-3 text-center">
                        <span class="badge bg-success-subtle text-success rounded-pill" style="font-size:0.68rem;padding:4px 10px;">
                            <i class="bi bi-check-circle-fill me-1"></i>Active Project
                        </span>
                    </td>
                    <td class="px-4 py-3 text-end">
                        <a href="billing.html" class="btn btn-sm btn-outline-success me-1" title="View Invoices" style="font-size:0.75rem;">
                            <i class="bi bi-receipt"></i> Invoices
                        </a>
                        <a href="visits.html" class="btn btn-sm btn-outline-primary" title="View Issues" style="font-size:0.75rem;">
                            <i class="bi bi-journals"></i> Visits
                        </a>
                    </td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            wrapper.innerHTML = html;
        }

        // ── Live search filter ──
        function applySearch() {
            const q = (document.getElementById('project-search').value || '').toLowerCase().trim();
            if (!q) {
                renderProjectsTable(allProjects);
                return;
            }
            const filtered = allProjects.filter(p => {
                const hay = [p.name, p.contact_person, p.phone, p.email, p.pm_name, p.project_type, p.area_name]
                    .filter(Boolean).join(' ').toLowerCase();
                return hay.includes(q);
            });
            renderProjectsTable(filtered);
        }

        // ── Update stats ──
        function updateStats(projects) {
            document.getElementById('stat-total').textContent = projects.length;
            document.getElementById('total-count').textContent = projects.length;
            document.getElementById('stat-pm').textContent = projects.filter(p => p.pm_name).length;
            document.getElementById('stat-contact').textContent = projects.filter(p => p.phone || p.email).length;
            document.getElementById('stat-ai').textContent = projects.filter(p => (p.project_type || '').toLowerCase().includes('ai')).length;
        }

        // ── Load converted projects from API ──
        async function loadProjects() {
            const wrapper = document.getElementById('projects-table-wrapper');
            wrapper.innerHTML = `<div class="empty-state"><div class="spinner-border text-success" role="status"></div><div class="mt-2 text-muted">Loading...</div></div>`;
            try {
                const projectsRes = await window.ApiClient.request('/projects/');
                allProjects = projectsRes || [];
                updateStats(allProjects);
                renderProjectsTable(allProjects);
            } catch (err) {
                console.error('Failed to load projects', err);
                wrapper.innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-circle text-danger fs-2 d-block mb-2"></i><div>Failed to load projects</div></div>`;
            }
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => loadProjects());
    </script>
</body>

</html>
