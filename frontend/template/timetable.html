<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timetable &amp; Schedule — CRM AI SETU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f8fafc;
            overflow: hidden;
        }

        /* ── Toolbar ─────────────────────────────────────────── */
        .cal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .cal-toolbar .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #e2e8f0;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .85rem;
            color: #475569;
        }

        .cal-toolbar .nav-btn:hover {
            background: #f1f5f9;
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
            min-width: 180px;
        }

        .view-pill {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .view-pill button {
            border: none;
            background: #fff;
            padding: 4px 14px;
            font-size: .8rem;
            color: #64748b;
            cursor: pointer;
        }

        .view-pill button.active {
            background: #4f46e5;
            color: #fff;
        }

        /* ── Calendar container ──────────────────────────────── */
        .cal-wrapper {
            display: flex;
            height: calc(100vh - 140px);
            background: #fff;
            overflow: hidden;
            border-top: 1px solid #e2e8f0;
        }

        .cal-sidebar {
            width: 256px;
            flex-shrink: 0;
            padding: 16px;
            overflow-y: auto;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cal-root {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            height: 100%;
            background: #fff;
        }

        /* ── Sidebar Checks ──────────────────────────────────── */
        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: .85rem;
            font-weight: 500;
            color: #3c4043;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .sidebar-title:hover {
            color: #202124;
        }

        .check-item {
            display: flex;
            align-items: center;
            font-size: .85rem;
            color: #3c4043;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .accent-checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 2px solid var(--c);
            background: transparent;
            margin: 0;
            margin-right: 12px;
            position: relative;
            cursor: pointer;
        }

        .accent-checkbox:checked {
            background: var(--c);
        }

        .accent-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* ── Mini Calendar ───────────────────────────────────── */
        .mini-grid {
            padding: 0 4px;
        }

        .mini-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .mini-row.head .mc {
            color: #70757a;
            font-weight: 500;
            font-size: .65rem;
            pointer-events: none;
            background: transparent !important;
        }

        .mc {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            border-radius: 50%;
            cursor: pointer;
            color: #3c4043;
            transition: background .15s;
            font-weight: 500;
        }

        .mc:hover {
            background: #f1f3f4;
        }

        .mc.off {
            color: #70757a;
        }

        .mc.s {
            background: #e8eafd;
            color: #1a73e8;
        }

        .mc.t {
            background: #1a73e8;
            color: #fff;
            font-weight: 600;
        }

        .mc.t:hover {
            background: #1765cc;
        }

        /* Day header row */
        .cal-day-header-row {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            flex-shrink: 0;
            background: #fff;
        }

        .cal-gutter-head {
            width: 56px;
            flex-shrink: 0;
        }

        .cal-dh {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            border-left: 1px solid #f1f5f9;
        }

        .cal-dh .dn {
            font-size: .68rem;
            letter-spacing: .06em;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cal-dh .dd {
            font-size: 1.35rem;
            font-weight: 700;
            color: #334155;
            line-height: 1.3;
        }

        .cal-dh.today .dn {
            color: #4f46e5;
        }

        .cal-dh .today-dot {
            background: #4f46e5;
            color: #fff;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        /* Scrollable time grid */
        .cal-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .cal-body-inner {
            display: flex;
            position: relative;
        }

        /* Time gutter */
        .cal-gutter {
            width: 56px;
            flex-shrink: 0;
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 4;
        }

        .cal-hour-lbl {
            height: 60px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 3px 8px 0 0;
            font-size: .68rem;
            color: #94a3b8;
            box-sizing: border-box;
        }

        /* Day columns */
        .cal-cols {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cal-col {
            position: relative;
            border-left: 1px solid #f1f5f9;
            box-sizing: border-box;
        }

        .cal-col.today-col {
            background: rgba(79, 70, 229, .03);
        }

        .cal-hline {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px solid #e2e8f0;
            pointer-events: none;
        }

        .cal-hline-half {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed #f1f5f9;
            pointer-events: none;
        }

        /* Events */
        .cal-evt {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 6px;
            padding: 4px 6px;
            overflow: hidden;
            cursor: pointer;
            transition: filter .15s;
            z-index: 2;
            box-sizing: border-box;
            max-height: 64px;
        }

        .cal-evt:hover {
            filter: brightness(.93);
        }

        .evt-title {
            font-size: .72rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .evt-time {
            font-size: .65rem;
            opacity: .8;
            margin-top: 1px;
        }

        .evt-user {
            position: absolute;
            bottom: 3px;
            right: 5px;
            font-size: .6rem;
            font-weight: 700;
            opacity: .65;
        }

        /* Current time indicator */
        .now-dot {
            position: absolute;
            left: -5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transform: translateY(-50%);
            z-index: 6;
        }

        .now-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 2px solid #ef4444;
            transform: translateY(-50%);
            z-index: 5;
        }

        /* ── Modal styling ───────────────────────────────────── */
        /* Modal styling */
        .modal-content {
            border-radius: 16px;
            border: none;
        }

        .modal-header {
            border-bottom: none;
            padding: 24px 24px 8px;
        }

        .modal-body {
            padding: 8px 24px 16px;
        }

        .modal-footer {
            border-top: none;
            padding: 0 24px 20px;
        }

        /* Complete circle button on each event */
        .evt-complete-btn {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid currentColor;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            z-index: 3;
            transition: background .15s, transform .15s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .evt-complete-btn:hover {
            transform: scale(1.2);
        }

        .evt-complete-btn.done {
            background: currentColor;
        }

        .evt-complete-btn.done::after {
            content: '';
            display: block;
            width: 6px;
            height: 4px;
            border-left: 1.5px solid #fff;
            border-bottom: 1.5px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
        }

        /* Completed event: strikethrough + faded */
        .cal-evt.evt-done .evt-inner-title {
            text-decoration: line-through;
            opacity: .5;
        }

        .cal-evt.evt-done {
            opacity: .6;
        }

        /* ── Month view ─────────── */
        .month-header .cal-dh {
            padding: 8px 0;
            border: none;
            border-right: 1px solid #e2e8f0;
        }

        .month-header .cal-dh:last-child {
            border-right: none;
        }

        .month-grid {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            border-left: 1px solid #e2e8f0;
        }

        .month-row {
            display: flex;
            flex: 1;
            min-height: 120px;
            border-bottom: 1px solid #e2e8f0;
        }

        .month-cell {
            flex: 1;
            border-right: 1px solid #e2e8f0;
            padding: 4px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background .1s;
        }

        .month-cell:hover {
            background: #f8fafc;
        }

        .month-cell.off-month {
            background: #fafafa;
            opacity: .7;
        }

        .month-cell.today-cell {
            background: rgba(79, 70, 229, .02);
        }

        .month-cell-num {
            font-size: .85rem;
            font-weight: 500;
            color: #475569;
            padding: 4px;
            text-align: center;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            line-height: 18px;
            margin: 0 auto 4px auto;
        }

        .month-cell-num.today-num {
            background: #4f46e5;
            color: #fff;
        }

        .month-cell-evts {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .month-evt {
            font-size: .7rem;
            padding: 2px 4px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .month-evt:hover {
            filter: brightness(.9);
        }

        .month-evt.evt-done {
            text-decoration: line-through;
            opacity: .6;
        }

        .month-evt-more {
            font-size: .65rem;
            color: #64748b;
            text-align: center;
            margin-top: 2px;
            font-weight: 600;
        }

        /* ── Legend pill ─────────────────────────────────────── */
        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Switch to Tasks view ─────────────────────────────── */
        .task-toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #5f6368;
            font-size: 1rem;
            position: relative;
            transition: background .15s, color .15s;
        }

        .task-toggle-btn:hover {
            background: #f1f5f9;
            color: #4f46e5;
        }

        .task-toggle-btn.active {
            background: #e8eafd;
            color: #4f46e5;
            border-color: #c7d2fe;
        }

        .task-toggle-btn .tt-tip {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #3c4043;
            color: #fff;
            font-size: .72rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
            z-index: 20;
        }

        .task-toggle-btn:hover .tt-tip {
            opacity: 1;
        }

        /* Task list view */
        .task-view-wrap {
            padding: 24px 32px;
            flex: 1;
            overflow-y: auto;
        }

        .task-date-group {
            margin-bottom: 28px;
        }

        .task-date-lbl {
            font-size: .78rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 10px;
        }

        .task-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
            margin-bottom: 8px;
            border-left: 4px solid;
            transition: box-shadow .15s;
        }

        .task-row:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
        }

        .task-row.done-row {
            opacity: .55;
        }

        .task-row .t-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid currentColor;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, transform .15s;
        }

        .task-row .t-circle:hover {
            transform: scale(1.15);
        }

        .task-row .t-circle.t-done {
            background: currentColor;
        }

        .task-row .t-circle.t-done::after {
            content: '';
            display: block;
            width: 8px;
            height: 5px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
        }

        .task-row .t-info {
            flex: 1;
            min-width: 0;
        }

        .task-row .t-title {
            font-weight: 600;
            font-size: .88rem;
            color: #1e293b;
        }

        .task-row.done-row .t-title {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .task-row .t-meta {
            font-size: .75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .task-filter-pill {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .task-filter-pill button {
            border: none;
            background: #fff;
            padding: 5px 16px;
            font-size: .8rem;
            color: #64748b;
            cursor: pointer;
        }

        .task-filter-pill button.active {
            background: #4f46e5;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- ─── App Layout ───────────────────────────────────── -->
    <div class="d-flex" style="height:100vh; overflow:hidden;">
        <div id="sidebar" style="flex-shrink:0;"></div>
        <div class="flex-grow-1">
            <div class="page-content">
                <div id="main-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
            </div>
        </div>
    </div>

    <!-- ─── Unified Schedule/Task Modal ──────────────────────── -->
    <div class="modal fade" id="scheduleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width:550px;">
            <div class="modal-content shadow-lg">
                <div class="modal-header align-items-center">
                    <h5 class="modal-title fw-bold mb-0">
                        <i class="bi bi-calendar-plus-fill text-primary me-2"></i><span id="modal-title-text">Create
                            Activity</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pb-2">
                    <!-- Type Toggle -->
                    <div class="d-flex bg-light p-1 rounded-3 mb-4" style="border: 1px solid #e2e8f0;">
                        <input type="radio" class="btn-check" name="activityType" id="typeEvent" value="EVENT" checked
                            autocomplete="off" onchange="toggleModalType()">
                        <label class="btn btn-outline-primary border-0 flex-1 w-50 fw-semibold" for="typeEvent">Event /
                            Meeting</label>

                        <input type="radio" class="btn-check" name="activityType" id="typeTask" value="TASK"
                            autocomplete="off" onchange="toggleModalType()">
                        <label class="btn btn-outline-primary border-0 flex-1 w-50 fw-semibold" for="typeTask">To-Do
                            Task</label>
                    </div>

                    <div class="row g-3">
                        <!-- Common Fields -->
                        <div class="col-12">
                            <label class="form-label fw-semibold small">Title <span class="text-danger">*</span></label>
                            <input type="text" id="ev-title" class="form-control" placeholder="What needs to be done?">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">Assignee <span
                                    class="text-danger">*</span></label>
                            <select id="ev-user" class="form-select">
                                <option>Nency Savaliya</option>
                                <option>Tisha Chauhan</option>
                                <option>Rahul Mehta</option>
                                <option>Admin</option>
                            </select>
                        </div>

                        <!-- EVENT specific fields -->
                        <div class="col-md-6 event-fields">
                            <label class="form-label fw-semibold small">Date <span class="text-danger">*</span></label>
                            <input type="date" id="ev-date" class="form-control">
                        </div>
                        <div class="col-md-6 event-fields">
                            <label class="form-label fw-semibold small">Start Time <span
                                    class="text-danger">*</span></label>
                            <input type="time" id="ev-start" class="form-control">
                        </div>
                        <div class="col-md-6 event-fields">
                            <label class="form-label fw-semibold small">End Time <span
                                    class="text-danger">*</span></label>
                            <input type="time" id="ev-end" class="form-control">
                        </div>
                        <div class="col-12 event-fields">
                            <label class="form-label fw-semibold small">Location / Notes</label>
                            <input type="text" id="ev-loc" class="form-control" placeholder="Office, online, etc.">
                        </div>

                        <!-- TASK specific fields -->
                        <div class="col-md-6 task-fields" style="display: none;">
                            <label class="form-label fw-semibold small">Priority</label>
                            <select id="td-priority" class="form-select">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>
                        <div class="col-md-6 task-fields" style="display: none;">
                            <label class="form-label fw-semibold small">Due Date & Time</label>
                            <input type="datetime-local" id="td-due" class="form-control">
                        </div>
                        <div class="col-12 task-fields" style="display: none;">
                            <label class="form-label fw-semibold small">Related Entity</label>
                            <input type="text" id="td-related" class="form-control"
                                placeholder="Project, Client or Lead name">
                        </div>
                        <div class="col-12 task-fields" style="display: none;">
                            <label class="form-label fw-semibold small">Description</label>
                            <textarea id="td-desc" class="form-control" rows="2"
                                placeholder="Additional details..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer gap-2 border-top">
                    <!-- Added an extra delete button container that can be toggled via JS -->
                    <button class="btn btn-outline-danger me-auto" id="btn-delete-event" style="display: none;">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" id="btn-save-event" onclick="saveActivity()">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Scripts ───────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui_components.js"></script>
    <script src="../js/auth.js?v=2.3"></script>

    <script>
        // ── Auth & Sidebar ──────────────────────────────────────
        requireAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('timetable');

        // ── Constants ───────────────────────────────────────────
        const HOUR_H = 60;   // px per hour
        const START_HR = 7;    // 7 AM
        const END_HR = 21;   // 9 PM
        const DAY_NAMES = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

        // ── User colour palette ─────────────────────────────────
        const USERS = {
            'Nency Savaliya': { color: '#4f46e5', bg: 'rgba(79,70,229,.13)', initials: 'NS' },
            'Tisha Chauhan': { color: '#0891b2', bg: 'rgba(8,145,178,.13)', initials: 'TC' },
            'Rahul Mehta': { color: '#16a34a', bg: 'rgba(22,163,74,.13)', initials: 'RM' },
            'Admin': { color: '#dc2626', bg: 'rgba(220,38,38,.13)', initials: 'AD' },
        };

        // ── Navigation state ─────────────────────────────────────
        let weekStart = getWeekStart(new Date());
        let selectedDate = new Date();
        let currentView = 'week';
        let showTaskView = false;          // NEW: task list mode toggle
        let taskFilter = 'all';          // 'all' | 'pending' | 'done'
        let bsModal;
        const completedIds = new Set();
        let miniMonthOffset = 0;

        // ── Status colour palette ───────────────────────────────
        const STATUS_COLORS = {
            'PENDING': { color: '#007bff', bg: 'rgba(0,123,255,0.13)' },
            'SCHEDULED': { color: '#007bff', bg: 'rgba(0,123,255,0.13)' },
            'COMPLETED': { color: '#28a745', bg: 'rgba(40,167,69,0.13)' },
            'DONE': { color: '#28a745', bg: 'rgba(40,167,69,0.13)' },
            'CANCELLED': { color: '#dc3545', bg: 'rgba(220,53,69,0.13)' },
            'CANCEL': { color: '#dc3545', bg: 'rgba(220,53,69,0.13)' },
            'RESCHEDULE': { color: '#17a2b8', bg: 'rgba(23,162,184,0.13)' }
        };

        function getEventStyles(ev) {
            const status = (ev.status || '').toUpperCase();
            const baseUser = USERS[ev.user] || { color: '#6b7280', bg: 'rgba(107,114,128,0.13)', initials: '?' };

            // Priority for Meetings or if status is explicitly actionable (Done/Cancelled)
            if (ev.event_type === 'MEETING' || status === 'COMPLETED' || status === 'CANCELLED' || status === 'DONE' || status === 'CANCEL') {
                if (STATUS_COLORS[status]) {
                    return {
                        ...STATUS_COLORS[status],
                        initials: baseUser.initials
                    };
                }
            }
            return baseUser;
        }

        // ── Computed week events ─────────────────────────────────
        let events = [];

        // ── Helpers ─────────────────────────────────────────────
        function getWeekStart(d) {
            const dt = new Date(d);
            dt.setDate(dt.getDate() - dt.getDay());
            dt.setHours(0, 0, 0, 0);
            return dt;
        }
        function addDays(d, n) {
            const r = new Date(d); r.setDate(r.getDate() + n); return r;
        }
        function dStr(d) {
            const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function fmtH(h, m) {
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
        }

        function topPx(h, m) { return (h - START_HR) * HOUR_H + (m / 60) * HOUR_H; }
        function hPx(sh, sm, eh, em) {
            return Math.max(((eh - sh) * 60 + (em - sm)) / 60 * HOUR_H, 20);
        }

        // ── Load events from API ────────────────────────────────
        async function fetchEvents(startStr, endStr) {
            try {
                const data = await ApiClient.getTimetable(startStr, endStr);
                const evts = data.events || [];
                evts.forEach(e => { e._uid = e.event_type + '_' + e.id; });
                return evts;
            } catch (error) {
                console.error("Failed to load timetable events:", error);
                return [];
            }
        }

        // ── Event actions ───────────────────────────────────────
        async function saveEvent() {
            const title = document.getElementById('ev-title').value.trim();
            const user = document.getElementById('ev-user').value;
            const date = document.getElementById('ev-date').value;
            const start = document.getElementById('ev-start').value;
            const end = document.getElementById('ev-end').value;

            if (!title || !date || !start || !end) {
                document.getElementById('ev-title').classList.add('is-invalid');
                setTimeout(() => document.getElementById('ev-title').classList.remove('is-invalid'), 2000);
                return;
            }

            const eventData = {
                title: title,
                assignee_name: user,
                date: date,
                start_time: start,
                end_time: end,
                location: document.getElementById('ev-loc').value.trim() || ''
            };

            try {
                await ApiClient.createTimetableEvent(eventData);

                // Reset form
                ['ev-title', 'ev-date', 'ev-start', 'ev-end', 'ev-loc'].forEach(id => {
                    const el = document.getElementById(id); if (el) el.value = '';
                });
                document.getElementById('ev-user').value = 'Nency Savaliya';

                bsModal.hide();
                await renderCalendar();
                showToastMsg('Activity scheduled!');
            } catch (error) {
                console.error("Failed to schedule event", error);
                alert("Failed to schedule event");
            }
        }

        function completeEvent(id) {
            if (completedIds.has(id)) {
                completedIds.delete(id);
            } else {
                completedIds.add(id);
            }
            // For a real app, this would be an API call to mark it complete.
            // But we don't have a status on timetable_events currently.
            renderCalendarLocal();
        }

        // ── Navigation functions ────────────────────────────────
        function navWeek(n) {
            weekStart = addDays(weekStart, n * 7);
            renderCalendar();
        }

        function goToday() {
            weekStart = getWeekStart(new Date());
            selectedDate = new Date();
            renderCalendar();
        }

        function setView(view) {
            currentView = view;
            renderCalendar();
        }

        function selectDay(dateStr) {
            selectedDate = new Date(dateStr);
            currentView = 'day';
            renderCalendar();
        }

        function toggleTaskView() {
            showTaskView = !showTaskView;
            renderCalendar();
        }

        function setTaskFilter(filter) {
            taskFilter = filter;
            renderCalendar();
        }

        // ── Sidebar generator ───────────────────────────────────
        function buildSidebar() {
            // My calendars
            const myCals = `
            <div class="sidebar-section">
                <div class="sidebar-title">
                    <span>My calendars</span>
                    <i class="bi bi-chevron-up text-muted"></i>
                </div>
                <div>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:${USERS['Nency Savaliya']?.color || '#1a73e8'}"> Nency Savaliya
                    </label>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:#3b82f6"> Birthdays
                    </label>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:#8b5cf6"> Tasks
                    </label>
                </div>
            </div>`;

            // Other calendars
            const otherCals = `
            <div class="sidebar-section">
                <div class="sidebar-title">
                    <span>Other calendars</span>
                    <i class="bi bi-plus-lg text-muted"></i>
                </div>
                <div>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:${USERS['Tisha Chauhan']?.color || '#0ea5e9'}"> Tisha Chauhan
                    </label>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:${USERS['Rahul Mehta']?.color || '#22c55e'}"> Rahul Mehta
                    </label>
                    <label class="check-item">
                        <input type="checkbox" checked class="accent-checkbox" style="--c:${USERS['Admin']?.color || '#ef4444'}"> Admin
                    </label>
                </div>

            // Mini Calendar
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let mMonthDate;
            if (currentView === 'day' || currentView === 'month') {
                mMonthDate = new Date(selectedDate);
            } else {
                mMonthDate = new Date(weekStart);
            }
            mMonthDate.setDate(1);
            mMonthDate.setMonth(mMonthDate.getMonth() + miniMonthOffset);

            const moStr = mMonthDate.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

            const firstDay = new Date(mMonthDate.getFullYear(), mMonthDate.getMonth(), 1);
            let cur = addDays(firstDay, -firstDay.getDay()); // go back to Sunday

            let minidays = '<div class="mini-row head"><div class="mc">S</div><div class="mc">M</div><div class="mc">T</div><div class="mc">W</div><div class="mc">T</div><div class="mc">F</div><div class="mc">S</div></div>';

            for (let w = 0; w < 6; w++) {
                let r = '<div class="mini-row">';
                for (let d = 0; d < 7; d++) {
                    const isM = (cur.getMonth() === mMonthDate.getMonth());
                    const isT = (cur.getTime() === today.getTime());

                    // Selected week/day logic
                    let isSel = false;
                    if (currentView === 'week') {
                        isSel = cur >= weekStart && cur < addDays(weekStart, 7);
                    } else if (currentView === 'day' || currentView === 'month') {
                        isSel = cur.getTime() === selectedDate.getTime() || (currentView === 'month' && cur.getMonth() === selectedDate.getMonth() && cur.getFullYear() === selectedDate.getFullYear());
                    }

                    const c = `mc ${isM ? '' : 'off'} ${isT ? 't' : ''} ${isSel && !isT ? 's' : ''}`;
                    r += `<div class="${c}" onclick="selectDay('${dStr(cur)}')">${cur.getDate()}</div>`;

                    cur = addDays(cur, 1);
                }
                r += '</div>';
                minidays += r;
                if (cur.getMonth() !== mMonthDate.getMonth() && cur > firstDay) break; // stop if month changes and we're done
            }

            const miniCal = `
            <div class="sidebar-section mb-3 mt-2">
                <div class="d-flex align-items-center justify-content-between px-1 mb-2">

                    <div>
                        <i class="bi bi-chevron-left me-3 text-muted" style="cursor:pointer;font-size:.8rem;" onclick="navMini(-1)"></i>
                        <i class="bi bi-chevron-right text-muted" style="cursor:pointer;font-size:.8rem;" onclick="navMini(1)"></i>
                    </div>
                </div>
                <div class="mini-grid">
                    ${minidays}

            return `
            <div class="cal-sidebar">
